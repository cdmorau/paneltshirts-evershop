<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>window._appBase = new URL('..', document.URL).pathname.replace(/\/$/, '');</script>
<title>Biblioteca Panel</title>
<style>
:root {
  --border: 1px solid #e0e0e0;
  --sel: #3399ff;
  --font: 'Courier New', Courier, monospace;
  --header-h: 48px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: #e4e4e4;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
#lib-header {
  height: var(--header-h);
  background: #fff;
  border-bottom: var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 20;
}

#lib-title {
  font-size: 13px;
  letter-spacing: 2px;
  font-weight: bold;
  color: #222;
  white-space: nowrap;
}

#lib-filter-sel {
  height: 30px;
  border: var(--border);
  border-radius: 4px;
  font-family: var(--font);
  font-size: 11px;
  padding: 0 6px;
  background: #f8f8f8;
  cursor: pointer;
  outline: none;
  color: #333;
  flex-shrink: 0;
}
#lib-filter-sel:focus { border-color: var(--sel); }

#lib-search-wrap {
  flex: 1;
  max-width: 220px;
  position: relative;
}
#lib-search {
  width: 100%;
  height: 30px;
  border: var(--border);
  border-radius: 4px;
  padding: 0 10px 0 26px;
  font-family: var(--font);
  font-size: 12px;
  outline: none;
  background: #f8f8f8;
}
#lib-search:focus { border-color: var(--sel); background: #fff; }
#lib-search-icon {
  position: absolute;
  left: 7px; top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: #999;
  pointer-events: none;
}

#lib-count { font-size: 11px; color: #888; white-space: nowrap; }

#lib-regenerar, #lib-mezclar {
  height: 28px;
  padding: 0 10px;
  border: var(--border);
  border-radius: 3px;
  background: #fff;
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: .5px;
  cursor: pointer;
  color: #555;
  transition: all .12s;
  flex-shrink: 0;
}
#lib-regenerar:hover, #lib-mezclar:hover { border-color: #888; color: #000; }

#lib-nav-link {
  font-size: 11px;
  color: var(--sel);
  text-decoration: none;
  white-space: nowrap;
  letter-spacing: .5px;
  padding: 4px 10px;
  border: 1px solid var(--sel);
  border-radius: 3px;
  transition: background .12s, color .12s;
  flex-shrink: 0;
}
#lib-nav-link:hover { background: var(--sel); color: #fff; }

/* ── BODY SPLIT ── */
#lib-body {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}

/* ── LEFT: LIBRARY ── */
#lib-main {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  scrollbar-width: thin;
}
#lib-main::-webkit-scrollbar { width: 4px; }
#lib-main::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

#lib-canvas {
  background: #fff;
  border: 2px solid rgba(0,0,0,.15);
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,.1);
}

/* ── CELLS ── */
.lib-cell {
  position: absolute;
  overflow: hidden;
  background: #fff;
  cursor: pointer;
  outline: 2px solid transparent;
  transition: outline-color .1s;
}
.lib-cell:hover { outline-color: var(--sel); }
.lib-cell.selected { outline-color: var(--sel); outline-width: 3px; }

.lib-cell img {
  display: block;
  pointer-events: none;
  position: absolute;
  transform-origin: 50% 50%;
}

.lib-cell-badge { display: none; }

/* hover overlay */
.lib-cell-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.72);
  padding: 5px 8px;
  opacity: 0;
  transition: opacity .15s;
  z-index: 5;
  pointer-events: none;
}
.lib-cell:hover .lib-cell-overlay { opacity: 1; pointer-events: all; }

.lib-cell-num {
  display: block;
  color: #888;
  font-size: 8px;
  letter-spacing: 1px;
}
.lib-cell-label {
  display: block;
  color: #fff;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.lib-cell-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.lib-tag {
  font-size: 9px;
  background: rgba(255,255,255,.15);
  color: #fff;
  border-radius: 100px;
  padding: 1px 7px;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,.25);
  transition: background .1s;
  white-space: nowrap;
}
.lib-tag:hover { background: var(--sel); border-color: var(--sel); }

#lib-empty {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  color: #aaa;
  font-size: 13px;
  letter-spacing: 1px;
}

/* ── RIGHT: CART ── */
#lib-cart {
  width: 260px;
  flex-shrink: 0;
  background: #fff;
  border-left: var(--border);
  display: flex;
  flex-direction: column;
}

#lib-cart-header {
  padding: 10px 14px 8px;
  border-bottom: var(--border);
  flex-shrink: 0;
}
#lib-cart-title {
  display: block;
  font-size: 10px;
  letter-spacing: 2px;
  font-weight: bold;
  color: #222;
}
#lib-cart-count {
  display: block;
  font-size: 10px;
  color: #888;
  margin-top: 1px;
}

#lib-cart-preview-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  background: #f4f4f4;
  min-height: 0;
  position: relative;
}
#lib-cart-empty {
  color: #bbb;
  font-size: 10px;
  letter-spacing: .5px;
  text-align: center;
  line-height: 1.8;
}
#lib-cart-canvas {
  position: relative;
  overflow: hidden;
  background: #fff;
  border: 1px solid #ddd;
  box-shadow: 0 1px 8px rgba(0,0,0,.08);
  display: none;
}

/* cart cells */
.cart-cell {
  position: absolute;
  overflow: visible;
  background: #fff;
  cursor: pointer;
}
.cart-cell-inner {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.cart-cell-inner::after {
  content: '×';
  position: absolute;
  inset: 0;
  background: rgba(220,40,40,.55);
  color: #fff;
  font-size: 22px;
  font-weight: bold;
  display: none;
  align-items: center;
  justify-content: center;
}
.cart-cell:hover .cart-cell-inner::after { display: flex; }
/* touch: show × on tap */
.cart-cell:active .cart-cell-inner::after { display: flex; }

/* hide rotation buttons inside the mobile sheet preview */
#lib-sheet-canvas .cart-rot-btn { display: none !important; }
.cart-cell img {
  display: block;
  pointer-events: none;
  position: absolute;
  transform-origin: 50% 50%;
}
.cart-rot-btn {
  position: absolute;
  bottom: -8px; right: -8px;
  width: 18px; height: 18px;
  background: var(--sel);
  border-radius: 50%;
  border: none; cursor: pointer;
  color: #fff; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .15s;
  z-index: 10; pointer-events: all;
}
.cart-cell:hover .cart-rot-btn { opacity: 1; }
.cart-rot-popover {
  position: absolute;
  bottom: 14px; right: -4px;
  background: #222; border-radius: 4px;
  display: flex; align-items: center; gap: 4px;
  padding: 5px 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.5);
  white-space: nowrap;
}
.cart-rot-popover button {
  background: none; border: none; color: #fff;
  font-size: 14px; cursor: pointer; opacity: .75; padding: 0 2px;
}
.cart-rot-popover button:hover { opacity: 1; }
.cart-rot-popover input[type=number] {
  width: 36px; background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.3); border-radius: 2px;
  color: #fff; font-size: 10px; text-align: center;
  padding: 1px 3px; font-family: var(--font); -moz-appearance: textfield;
}
.cart-rot-popover input[type=number]::-webkit-inner-spin-button,
.cart-rot-popover input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

#lib-cart-footer {
  padding: 10px 14px 12px;
  border-top: var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
#lib-cart-clear {
  height: 30px;
  background: #fff;
  border: var(--border);
  border-radius: 3px;
  font-family: var(--font);
  font-size: 10px;
  cursor: pointer;
  color: #666;
  letter-spacing: .5px;
  transition: all .12s;
}
#lib-cart-clear:hover { border-color: #888; color: #000; }
#lib-cart-design {
  height: 36px;
  background: var(--sel);
  border: none;
  border-radius: 3px;
  font-family: var(--font);
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
  color: #fff;
  transition: background .12s;
}
#lib-cart-design:hover:not(:disabled) { background: #0077ee; }
#lib-cart-design:disabled { background: #ccc; cursor: default; color: #fff; }

/* ── FILTER CHIPS BAR ── */
#lib-filter-bar {
  display: none; /* populated + shown by JS on all screens, but styled differently */
  background: #fff;
  border-bottom: var(--border);
  padding: 0 12px;
  gap: 6px;
  overflow-x: auto;
  overflow-y: hidden;
  flex-shrink: 0;
  height: 38px;
  align-items: center;
  scrollbar-width: none;
}
#lib-filter-bar::-webkit-scrollbar { display: none; }

.lib-chip {
  height: 24px;
  padding: 0 10px;
  border: 1px solid #ddd;
  border-radius: 100px;
  font-family: var(--font);
  font-size: 10px;
  letter-spacing: .5px;
  white-space: nowrap;
  cursor: pointer;
  background: #f8f8f8;
  color: #555;
  transition: all .12s;
  flex-shrink: 0;
}
.lib-chip:hover { border-color: #888; color: #222; }
.lib-chip.active { background: #222; color: #fff; border-color: #222; }

/* ── FLOATING ACTION BUTTON (mobile) ── */
#lib-cart-fab {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 16px;
  z-index: 100;
  height: 44px;
  min-width: 44px;
  padding: 0 16px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 22px;
  font-family: var(--font);
  font-size: 11px;
  font-weight: bold;
  letter-spacing: .5px;
  cursor: pointer;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.35);
  transition: transform .1s;
}
#lib-cart-fab:active { transform: scale(.95); }

/* ── MOBILE BOTTOM SHEET ── */
@media (max-width: 640px) {
  /* Header: search ocupa todo el ancho */
  #lib-title    { display: none; }
  #lib-filter-sel { display: none; }
  #lib-count    { display: none; }
  #lib-search-wrap { flex: 1; max-width: none; }
  #lib-search   { height: 34px; font-size: 14px; border-radius: 8px; background: #f0f0f0; border-color: transparent; }
  #lib-search:focus { background: #fff; border-color: var(--sel); }
  #lib-header   { padding: 0 12px; gap: 8px; }

  /* Filter chips bar visible en mobile */
  #lib-filter-bar { display: flex; }

  /* Body: solo galería, sin sidebar */
  #lib-body { flex-direction: column; }
  #lib-cart  { display: none; } /* se reemplaza por el bottom sheet */
  #lib-main  { padding: 8px; }

  /* FAB visible cuando hay selección */
  #lib-cart-fab { display: none; } /* JS la muestra cuando CART.size > 0 */

  /* Bottom sheet del carrito */
  #lib-cart-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 2px solid #e0e0e0;
    border-radius: 16px 16px 0 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    max-height: 80vh;
    transform: translateY(100%);
    transition: transform .3s ease;
    box-shadow: 0 -4px 24px rgba(0,0,0,.15);
  }
  #lib-cart-sheet.open { transform: translateY(0); }

  #lib-sheet-handle {
    width: 36px; height: 4px;
    background: #ccc; border-radius: 2px;
    margin: 10px auto 6px;
    flex-shrink: 0;
  }
  #lib-sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px 10px;
    flex-shrink: 0;
    border-bottom: var(--border);
  }
  #lib-sheet-title {
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 2px;
    color: #222;
  }
  #lib-sheet-close {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #666;
    padding: 0 4px;
    line-height: 1;
  }
  #lib-sheet-preview {
    flex: 1;
    overflow: auto;
    padding: 10px;
    background: #f4f4f4;
    min-height: 120px;
    position: relative;
  }
  #lib-sheet-canvas {
    position: relative;
    overflow: hidden;
    background: #fff;
    border: 1px solid #ddd;
    box-shadow: 0 1px 8px rgba(0,0,0,.08);
    width: 100%; height: 160px;
    display: none;
  }
  #lib-sheet-empty {
    color: #bbb;
    font-size: 10px;
    letter-spacing: .5px;
    text-align: center;
    line-height: 1.8;
    padding: 20px 0;
  }
  #lib-sheet-footer {
    padding: 10px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-top: var(--border);
  }
  .lib-sheet-btn-clear {
    height: 36px;
    background: #fff;
    border: var(--border);
    border-radius: 6px;
    font-family: var(--font);
    font-size: 11px;
    cursor: pointer;
    color: #666;
  }
  .lib-sheet-btn-design {
    height: 44px;
    background: #111;
    border: none;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    color: #fff;
  }
  .lib-sheet-btn-design:disabled { background: #ccc; cursor: default; }

  /* Overlay */
  #lib-sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 190;
    display: none;
  }
  #lib-sheet-overlay.open { display: block; }
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div id="lib-header">
  <span id="lib-title">BIBLIOTECA PANEL</span>
  <select id="lib-filter-sel">
    <option value="">Categoría: todas</option>
  </select>
  <div id="lib-search-wrap">
    <span id="lib-search-icon">🔍</span>
    <input id="lib-search" type="text" placeholder="buscar…" autocomplete="off" spellcheck="false">
  </div>
  <span id="lib-count"></span>
  <button id="lib-mezclar">MEZCLAR</button>
</div>

<!-- ── FILTER CHIPS BAR (mobile) ── -->
<div id="lib-filter-bar"></div>

<!-- ── FAB (mobile) ── -->
<button id="lib-cart-fab">
  <span>CARRITO DE EDICIÓN</span>
  <span class="fab-count">0</span>
</button>

<!-- ── BOTTOM SHEET OVERLAY ── -->
<div id="lib-sheet-overlay"></div>

<!-- ── BOTTOM SHEET ── -->
<div id="lib-cart-sheet">
  <div id="lib-sheet-handle"></div>
  <div id="lib-sheet-header">
    <span id="lib-sheet-title">MI SELECCIÓN</span>
    <button id="lib-sheet-close">×</button>
  </div>
  <div id="lib-sheet-preview">
    <div id="lib-sheet-empty">Hacé clic en los paneles para agregar</div>
    <div id="lib-sheet-canvas"></div>
  </div>
  <div id="lib-sheet-footer">
    <button class="lib-sheet-btn-clear" id="lib-sheet-clear">Limpiar selección</button>
    <button class="lib-sheet-btn-design" id="lib-sheet-design" disabled>Diseñar con estos →</button>
  </div>
</div>

<!-- ── BODY SPLIT ── -->
<div id="lib-body">

  <!-- Library grid -->
  <div id="lib-main">
    <div id="lib-canvas">
      <div id="lib-empty">Sin resultados</div>
    </div>
  </div>

  <!-- Cart / selection -->
  <div id="lib-cart">
    <div id="lib-cart-header">
      <span id="lib-cart-title">MI SELECCIÓN</span>
      <span id="lib-cart-count">0 paneles</span>
    </div>
    <div id="lib-cart-preview-wrap">
      <span id="lib-cart-empty">Hacé clic en los<br>paneles para agregar</span>
      <div id="lib-cart-canvas"></div>
    </div>
    <div id="lib-cart-footer">
      <button id="lib-cart-clear">Limpiar selección</button>
      <button id="lib-cart-design" disabled>Diseñar con estos →</button>
    </div>
  </div>

</div><!-- /#lib-body -->

// ══════════════════════════════════════════════════════
let IMAGES = [];

/**
 * Loads all image metadata from a single pre-generated manifest.json.
 * One HTTP request replaces the old 334-probe discovery loop.
 * manifest.json is regenerated by: node generate-manifest.mjs
 */
function probeImages(done) {
  fetch('../images/manifest.json')
    .then(r => {
      if (!r.ok) throw new Error(`manifest fetch failed: ${r.status}`);
      return r.json();
    })
    .then(data => {
      IMAGES = data.map(entry => ({
        id:    entry.id,
        src:   '../' + entry.src,
        lbl:   entry.lbl,
        ratio: entry.ratio || 1,
      }));
      done();
    })
    .catch(err => {
      console.error('manifest.json load failed:', err);
      // Graceful degradation: show empty gallery rather than hang
      IMAGES = [];
      done();
    });
}

// ══════════════════════════════════════════════════════
//  BSP ALGORITHMS
// ══════════════════════════════════════════════════════
let _uid = 0;
const uid   = () => 'n' + (++_uid);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

const shuffleArray = arr => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

function _effectiveRatio(img) {
  const r = img.ratio || 1, rot = img.rotation || 0;
  if (!rot) return r;
  const θ = rot * Math.PI / 180;
  const sinT = Math.abs(Math.sin(θ)), cosT = Math.abs(Math.cos(θ));
  return (r * cosT + sinT) / (r * sinT + cosT);
}

function greedyPartition(imgs, k) {
  const n = imgs.length;
  if (k >= n) return imgs.map(img => [img]);
  if (k === 1) return [[...imgs]];
  const totalW = imgs.reduce((s, img) => s + img.ratio, 0);
  const targetW = totalW / k;
  const rows = [[]]; let rowW = 0;
  for (let i = 0; i < n; i++) {
    const w = imgs[i].ratio;
    const remImgs = n - i, remRows = k - rows.length;
    const mustBreak = remRows > 0 && remImgs <= remRows && rows[rows.length - 1].length > 0;
    const wantBreak = rows.length < k && rowW > 0 && remImgs > remRows &&
                      Math.abs(rowW - targetW) <= Math.abs(rowW + w - targetW);
    if (mustBreak || wantBreak) { rows.push([]); rowW = 0; }
    rows[rows.length - 1].push(imgs[i]);
    rowW += w;
  }
  return rows;
}

function leaf(imageId = null) { return { id: uid(), type: 'leaf', imageId }; }

function buildRowBSP(rowImgs) {
  if (!rowImgs.length) return leaf();
  if (rowImgs.length === 1) return leaf(rowImgs[0].id);
  const totalW = rowImgs.reduce((s, img) => s + (img.ratio || 1), 0) || 1;
  return { id: uid(), type: 'split', dir: 'v',
    ratio: clamp((rowImgs[0].ratio || 1) / totalW, 0.08, 0.92),
    children: [leaf(rowImgs[0].id), buildRowBSP(rowImgs.slice(1))] };
}

function buildRowsBSP(rows, normH) {
  if (rows.length === 1) return buildRowBSP(rows[0]);
  const h0 = normH[0];
  const restSum = normH.slice(1).reduce((a, b) => a + b, 0);
  const restN = restSum > 0 ? normH.slice(1).map(h => h / restSum) : normH.slice(1).map(() => 1 / (normH.length - 1));
  return { id: uid(), type: 'split', dir: 'h',
    ratio: clamp(h0, 0.08, 0.92),
    children: [buildRowBSP(rows[0]), buildRowsBSP(rows.slice(1), restN)] };
}

function computeAutoLayout(imgs, targetR = 0.75) {
  if (!imgs.length) return { root: leaf(), R: targetR || 0.75 };
  if (imgs.length === 1) return { root: leaf(imgs[0].id), R: targetR || 1 };
  const n = imgs.length;
  let bestResult = null, bestScore = Infinity;
  for (let k = 1; k <= n; k++) {
    const rows = greedyPartition(imgs, k);
    const invS = rows.map(row => { const S = row.reduce((s, i) => s + (i.ratio || 1), 0); return S > 0 ? 1 / S : 1; });
    const sumInvS = invS.reduce((a, b) => a + b, 0);
    const idealR = sumInvS > 0 ? 1 / sumInvS : 0.75;
    const meanH = 1 / k;
    const variance = invS.reduce((s, inv) => { const h = inv / (sumInvS || 1); return s + (h - meanH) ** 2; }, 0);
    const score = targetR > 0 ? Math.abs(Math.log(idealR / targetR)) * 5 + variance : variance;
    if (score < bestScore) { bestScore = score; bestResult = { rows, idealR, invS, sumInvS }; }
  }
  const { rows, invS, sumInvS } = bestResult;
  const normH = invS.map(inv => inv / (sumInvS || 1));
  return { root: buildRowsBSP(rows, normH), R: bestResult.idealR };
}

// ══════════════════════════════════════════════════════
//  IMAGE LAYOUT HELPER
// ══════════════════════════════════════════════════════
function computeImgLayout(ratio, rotation, cellW, cellH) {
  const θ = (rotation || 0) * Math.PI / 180;
  const sinT = Math.abs(Math.sin(θ)), cosT = Math.abs(Math.cos(θ));
  const r = ratio || 1;
  const s = Math.min(cellW / (r * cosT + sinT), cellH / (r * sinT + cosT));
  const iW = r * s, iH = s;
  return { iW, iH, left: (cellW - iW) / 2, top: (cellH - iH) / 2 };
}

// ══════════════════════════════════════════════════════
//  LIBRARY RENDERER
// ══════════════════════════════════════════════════════
const MARGIN = 5;
const MIN_CELL_SIZE     = 80;  // px — minimum cell height for filtered views
const MIN_CELL_SIZE_ALL = 150; // px — minimum cell height when filter = "todas"

/** Count the number of horizontal-split rows in the BSP tree. */
function countRows(node) {
  if (node.type === 'leaf') return 1;
  if (node.dir === 'h') return countRows(node.children[0]) + countRows(node.children[1]);
  return Math.max(countRows(node.children[0]), countRows(node.children[1]));
}

// ── Throttled image loader (max 8 concurrent HTTP requests) ──────────────
const _IMG_CONCURRENCY = 8;
let _imgActive = 0;
const _imgQueue = [];

function _loadImg(img, src) {
  if (_imgActive < _IMG_CONCURRENCY) {
    _imgActive++;
    img.addEventListener('load',  _imgRelease, { once: true });
    img.addEventListener('error', _imgRelease, { once: true });
    img.src = src;
  } else {
    _imgQueue.push({ img, src });
  }
}

function _imgRelease() {
  _imgActive--;
  if (_imgQueue.length) {
    const { img, src } = _imgQueue.shift();
    _imgActive++;
    img.addEventListener('load',  _imgRelease, { once: true });
    img.addEventListener('error', _imgRelease, { once: true });
    img.src = src;
  }
}
// ─────────────────────────────────────────────────────────────────────────

function renderLibLeaf(node, x, y, w, h, parent) {
  const el = document.createElement('div');
  el.className = 'lib-cell';
  el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;

  if (node.imageId === null) { parent.appendChild(el); return; }

  const imgData = IMAGES[node.imageId];
  if (!imgData) { parent.appendChild(el); return; }

  el.dataset.imgId = node.imageId;

  const lay = computeImgLayout(imgData.ratio || 1, imgData.rotation || 0, w, h);
  const img = document.createElement('img');
  img.draggable = false;
  img.style.cssText = `width:${lay.iW}px;height:${lay.iH}px;left:${lay.left}px;top:${lay.top}px;`;
  _loadImg(img, imgData.src);
  el.appendChild(img);

  // Highlight if already in cart
  if (CART.has(node.imageId)) el.classList.add('selected');

  // Click → add to cart
  el.addEventListener('click', e => {
    if (e.target.classList.contains('lib-tag')) return;
    cartAdd(node.imageId);
  });

  // Hover overlay
  const overlay = document.createElement('div');
  overlay.className = 'lib-cell-overlay';

  const num = document.createElement('span');
  num.className = 'lib-cell-num';
  num.textContent = `PANEL ${imgData.lbl}`;
  overlay.appendChild(num);

  const d = PANEL_DATA[node.imageId] || { label: '', cats: [] };
  if (d.label) {
    const lbl = document.createElement('span');
    lbl.className = 'lib-cell-label';
    lbl.textContent = d.label;
    overlay.appendChild(lbl);
  }

  const tagsWrap = document.createElement('div');
  tagsWrap.className = 'lib-cell-tags';
  d.cats.forEach(cat => {
    const chip = document.createElement('span');
    chip.className = 'lib-tag';
    chip.textContent = cat;
    chip.addEventListener('click', e => {
      e.stopPropagation();
      setFilter(cat);
    });
    tagsWrap.appendChild(chip);
  });
  overlay.appendChild(tagsWrap);
  el.appendChild(overlay);

  parent.appendChild(el);
}

function renderLibNode(node, x, y, w, h, parent) {
  if (node.type === 'leaf') {
    renderLibLeaf(node, x, y, w, h, parent);
  } else {
    const r = node.ratio;
    if (node.dir === 'h') {
      const my = y + h * r;
      renderLibNode(node.children[0], x, y,  w, my - y,       parent);
      renderLibNode(node.children[1], x, my, w, (y + h) - my, parent);
    } else {
      const mx = x + w * r;
      renderLibNode(node.children[0], x,  y, mx - x,       h, parent);
      renderLibNode(node.children[1], mx, y, (x + w) - mx, h, parent);
    }
  }
}

// ══════════════════════════════════════════════════════
//  LIBRARY CANVAS SIZING & LAYOUT
// ══════════════════════════════════════════════════════
const _main   = document.getElementById('lib-main');
const _canvas = document.getElementById('lib-canvas');
let _cW = 0, _cH = 0, _lastTargetR = 1;

function fitLibCanvas(rW, rH, numRows) {
  const w = Math.max(_main.clientWidth - 32, 200);
  const naturalH = Math.round(w * rH / rW);
  const minH = (numRows || 1) * MIN_CELL_SIZE;
  const h = Math.max(naturalH, minH);
  _canvas.style.width  = w + 'px';
  _canvas.style.height = h + 'px';
  _cW = w; _cH = h;
}

// ══════════════════════════════════════════════════════
//  FILTER STATE
// ══════════════════════════════════════════════════════
let activeFilter = '';

function normStr(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function getFilteredImages() {
  const query = normStr(document.getElementById('lib-search').value.trim());
  return IMAGES.filter(img => {
    const d = PANEL_DATA[img.id] || { label: '', cats: [] };
    const matchesCat = !activeFilter || d.cats.includes(activeFilter);
    const matchesSearch = !query ||
      normStr(d.label).includes(query) ||
      d.cats.some(t => normStr(t).includes(query));
    return matchesCat && matchesSearch;
  });
}

function setFilter(cat) {
  activeFilter = cat;
  document.getElementById('lib-filter-sel').value = cat;
  updateChips(cat);
  relayout(false);
}

function isMobileView() { return window.innerWidth <= 640; }

function buildFilter() {
  const sel = document.getElementById('lib-filter-sel');
  const bar = document.getElementById('lib-filter-bar');
  const allCats = new Set();
  IMAGES.forEach(img => (PANEL_DATA[img.id]?.cats || []).forEach(t => allCats.add(t)));
  const sorted = [...allCats].sort((a, b) => a.localeCompare(b, 'es'));

  // Populate select (desktop)
  sorted.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    sel.appendChild(opt);
  });

  // Populate chips bar (mobile)
  bar.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'lib-chip active';
  allChip.textContent = 'Todas';
  allChip.dataset.cat = '';
  allChip.addEventListener('click', () => { setFilter(''); updateChips(''); });
  bar.appendChild(allChip);

  sorted.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'lib-chip';
    chip.textContent = cat;
    chip.dataset.cat = cat;
    chip.addEventListener('click', () => { setFilter(cat); updateChips(cat); });
    bar.appendChild(chip);
  });
}

function updateChips(activeCat) {
  document.querySelectorAll('.lib-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === activeCat);
  });
}

// ── MOBILE GRID LAYOUT ──
function relayoutGrid(cols) {
  _imgQueue.length = 0;
  const imgs = getFilteredImages();
  document.getElementById('lib-count').textContent =
    `${imgs.length} panel${imgs.length !== 1 ? 'es' : ''}`;

  _canvas.innerHTML = '';
  _canvas.appendChild(_emptyEl);

  if (!imgs.length) {
    _emptyEl.style.display = 'flex';
    _canvas.style.width  = (_main.clientWidth - 16) + 'px';
    _canvas.style.height = '180px';
    return;
  }
  _emptyEl.style.display = 'none';

  const gap = 4;
  const containerW = _main.clientWidth - 16;
  const cellSize = Math.floor((containerW - gap * (cols - 1)) / cols);
  const shuffled = shuffleArray([...imgs]);
  const rows = Math.ceil(shuffled.length / cols);
  const totalH = rows * cellSize + gap * (rows - 1);

  _canvas.style.width  = containerW + 'px';
  _canvas.style.height = totalH + 'px';

  shuffled.forEach((imgData, i) => {
    const row = Math.floor(i / cols);
    const col = i % cols;
    const x = col * (cellSize + gap);
    const y = row * (cellSize + gap);
    renderLibLeaf({ type: 'leaf', imageId: imgData.id }, x, y, cellSize, cellSize, _canvas);
  });
}

// ── FAB + BOTTOM SHEET ──
function updateFab() {
  const fab = document.getElementById('lib-cart-fab');
  if (!fab) return;
  const count = CART.size;
  if (isMobileView() && count > 0) {
    fab.style.display = 'flex';
    fab.querySelector('.fab-count').textContent = count;
  } else {
    fab.style.display = 'none';
  }
}

function openSheet() {
  document.getElementById('lib-cart-sheet').classList.add('open');
  document.getElementById('lib-sheet-overlay').classList.add('open');
  renderSheetCart();
}

function closeSheet() {
  document.getElementById('lib-cart-sheet').classList.remove('open');
  document.getElementById('lib-sheet-overlay').classList.remove('open');
}

function renderSheetCart() {
  const sheetCanvas = document.getElementById('lib-sheet-canvas');
  const sheetEmpty  = document.getElementById('lib-sheet-empty');
  const sheetDesign = document.getElementById('lib-sheet-design');
  const total = CART.size;
  document.querySelector('#lib-sheet-header #lib-sheet-title').textContent =
    `MI SELECCIÓN (${total})`;
  sheetDesign.disabled = total === 0;
  if (total === 0) {
    sheetCanvas.style.display = 'none';
    sheetEmpty.style.display = 'block';
    return;
  }
  sheetEmpty.style.display = 'none';
  sheetCanvas.style.display = 'block';
  const w = sheetCanvas.clientWidth || document.getElementById('lib-sheet-preview').clientWidth - 20;
  const h = 160;
  sheetCanvas.style.width = w + 'px';
  sheetCanvas.style.height = h + 'px';
  const cartImgs = [];
  CART.forEach((count, id) => {
    for (let i = 0; i < count; i++) cartImgs.push({ ...IMAGES[id] });
  });
  const { root } = computeAutoLayout(
    cartImgs.map(img => ({ ...img, ratio: Math.max(0.1, img.ratio || 1) })),
    w / h
  );
  sheetCanvas.innerHTML = '';
  const m = 3;
  renderCartNode(root, m, m, w - 2 * m, h - 2 * m, sheetCanvas);
}

// ══════════════════════════════════════════════════════
//  LIBRARY LAYOUT (relayout)
// ══════════════════════════════════════════════════════
const _emptyEl = document.getElementById('lib-empty');

function relayout(newRandom = true) {
  // Discard queued loads from the previous layout pass
  _imgQueue.length = 0;

  const imgs = getFilteredImages();
  document.getElementById('lib-count').textContent =
    `${imgs.length} panel${imgs.length !== 1 ? 'es' : ''}`;

  if (!imgs.length) {
    _canvas.innerHTML = '';
    _canvas.appendChild(_emptyEl);
    _emptyEl.style.display = 'flex';
    _canvas.style.width  = Math.max(_main.clientWidth - 32, 200) + 'px';
    _canvas.style.height = '180px';
    return;
  }
  _emptyEl.style.display = 'none';

  const shuffled = shuffleArray(imgs.map(img => ({ ...img, ratio: Math.max(0.1, _effectiveRatio(img)) })));

  if (!activeFilter) {
    // ── "TODAS": render fila‑por‑fila, sin el clamp de buildRowsBSP ──
    // Con 60+ filas, clamp(ratio, 0.08, 0.92) distorsionaría las alturas
    // exponencialmente. En su lugar:
    //   1. k filas calculado para que cada fila tenga ≈ MIN_CELL_SIZE_ALL px
    //   2. Altura de cada fila ∝ 1/S_j  (S_j = suma de ratios de la fila)
    //      → el ancho se llena exactamente, sin letterboxing vertical
    const availW = Math.max(_main.clientWidth - 32, 200);
    const totalRatioSum = shuffled.reduce((s, img) => s + img.ratio, 0);
    const k = Math.max(1, Math.round(totalRatioSum * MIN_CELL_SIZE_ALL / availW));
    const rows = greedyPartition(shuffled, k);

    const rowSums   = rows.map(row => row.reduce((s, img) => s + img.ratio, 0));
    const invSums   = rowSums.map(S => S > 0 ? 1 / S : 1);
    const totalInv  = invSums.reduce((a, b) => a + b, 0);
    const targetH   = k * MIN_CELL_SIZE_ALL;
    const rowHs     = invSums.map(inv => (inv / totalInv) * targetH);

    _cW = availW;
    _cH = Math.round(rowHs.reduce((a, b) => a + b, 0)) + 2 * MARGIN;
    _canvas.style.width  = _cW + 'px';
    _canvas.style.height = _cH + 'px';

    _canvas.innerHTML = '';
    _canvas.appendChild(_emptyEl);

    let y = MARGIN;
    rows.forEach((rowImgs, j) => {
      if (!rowImgs.length) return;
      renderLibNode(buildRowBSP(rowImgs), MARGIN, y, _cW - 2 * MARGIN, rowHs[j], _canvas);
      y += rowHs[j];
    });

  } else {
    // ── FILTRO ACTIVO: comportamiento original ──
    if (newRandom) {
      const availW = Math.max(_main.clientWidth  - 32, 200);
      const availH = Math.max(_main.clientHeight - 32, 200);
      _lastTargetR = (availW / availH) * (0.8 + Math.random() * 0.4);
    }
    const { root, R } = computeAutoLayout(shuffled, _lastTargetR);
    fitLibCanvas(R, 1, countRows(root));
    _canvas.innerHTML = '';
    _canvas.appendChild(_emptyEl);
    renderLibNode(root, MARGIN, MARGIN, _cW - 2 * MARGIN, _cH - 2 * MARGIN, _canvas);
  }
}

// ══════════════════════════════════════════════════════
//  CART STATE
// ══════════════════════════════════════════════════════
const CART = new Map(); // imageId → count
const CART_ROTATIONS = new Map(); // imageId → degrees

// Restore cart from localStorage so selection persists across navigation
(function() {
  try {
    const saved = JSON.parse(localStorage.getItem('panel-design-cart') || 'null');
    if (saved) Object.entries(saved).forEach(([id, count]) => CART.set(parseInt(id), count));
  } catch(e) {}
})();

function _persistCart() {
  const data = {};
  CART.forEach((count, id) => { data[id] = count; });
  try { localStorage.setItem('panel-design-cart', JSON.stringify(data)); } catch(e) {}
}

function cartAdd(id) {
  if (CART.has(id)) {
    CART.delete(id);
  } else {
    CART.set(id, 1);
  }
  _persistCart();
  updateCellBadge(id);
  renderCart();
}

function cartRemove(id) {
  CART.delete(id);
  _persistCart();
  updateCellBadge(id);
  renderCart();
}

function cartClear() {
  const ids = [...CART.keys()];
  CART.clear();
  _persistCart();
  ids.forEach(id => updateCellBadge(id));
  renderCart();
}

function updateCellBadge(id) {
  const inCart = CART.has(id);
  document.querySelectorAll(`.lib-cell[data-img-id="${id}"]`).forEach(el => {
    el.classList.toggle('selected', inCart);
  });
}

// ══════════════════════════════════════════════════════
//  CART PREVIEW RENDERER
// ══════════════════════════════════════════════════════
const _cartWrap   = document.getElementById('lib-cart-preview-wrap');
const _cartCanvas = document.getElementById('lib-cart-canvas');
const _cartEmpty  = document.getElementById('lib-cart-empty');

function fitCartCanvas() {
  const w = _cartWrap.clientWidth  - 20;
  const h = _cartWrap.clientHeight - 20;
  _cartCanvas.style.width  = w + 'px';
  _cartCanvas.style.height = h + 'px';
  return { w, h };
}

function renderCartLeaf(node, x, y, w, h, parent) {
  const el = document.createElement('div');
  el.className = 'cart-cell';
  el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;

  if (node.imageId !== null) {
    const imgData = IMAGES[node.imageId];
    if (imgData) {
      const rot = CART_ROTATIONS.get(node.imageId) || 0;
      const inner = document.createElement('div');
      inner.className = 'cart-cell-inner';
      const lay = computeImgLayout(imgData.ratio || 1, rot, w, h);
      const img = document.createElement('img');
      img.src = imgData.src;
      img.style.cssText = `width:${lay.iW}px;height:${lay.iH}px;left:${lay.left}px;top:${lay.top}px;` +
                          (rot ? `transform:rotate(${rot}deg);` : '');
      inner.appendChild(img);
      inner.addEventListener('click', () => cartRemove(node.imageId));
      el.appendChild(inner);

      // Rotation button
      const rotBtn = document.createElement('button');
      rotBtn.className = 'cart-rot-btn';
      rotBtn.textContent = '↻';
      rotBtn.title = 'Rotar';
      rotBtn.addEventListener('click', ev => {
        ev.stopPropagation();
        // Remove existing popovers
        document.querySelectorAll('.cart-rot-popover').forEach(p => p.remove());
        const pop = document.createElement('div');
        pop.className = 'cart-rot-popover';
        const btnM = document.createElement('button'); btnM.textContent = '↺'; btnM.title = '-15°';
        const numI = document.createElement('input');  numI.type = 'number'; numI.min = 0; numI.max = 359;
        numI.value = CART_ROTATIONS.get(node.imageId) || 0;
        const btnP = document.createElement('button'); btnP.textContent = '↻'; btnP.title = '+15°';
        function setRot(deg) {
          deg = ((Math.round(deg) % 360) + 360) % 360;
          CART_ROTATIONS.set(node.imageId, deg);
          numI.value = deg;
          renderCart();
        }
        btnM.addEventListener('click', ev2 => { ev2.stopPropagation(); setRot((CART_ROTATIONS.get(node.imageId) || 0) - 15); });
        btnP.addEventListener('click', ev2 => { ev2.stopPropagation(); setRot((CART_ROTATIONS.get(node.imageId) || 0) + 15); });
        numI.addEventListener('change', ev2 => { ev2.stopPropagation(); setRot(parseInt(numI.value) || 0); });
        numI.addEventListener('click',  ev2 => ev2.stopPropagation());
        pop.append(btnM, numI, btnP);
        el.appendChild(pop);
        setTimeout(() => {
          document.addEventListener('pointerdown', function oc(ev2) {
            if (!pop.contains(ev2.target) && ev2.target !== rotBtn) { pop.remove(); document.removeEventListener('pointerdown', oc); }
          });
        }, 0);
      });
      el.appendChild(rotBtn);
    }
  }
  parent.appendChild(el);
}

function renderCartNode(node, x, y, w, h, parent) {
  if (node.type === 'leaf') {
    renderCartLeaf(node, x, y, w, h, parent);
  } else {
    const r = node.ratio;
    if (node.dir === 'h') {
      const my = y + h * r;
      renderCartNode(node.children[0], x, y,  w, my - y,       parent);
      renderCartNode(node.children[1], x, my, w, (y + h) - my, parent);
    } else {
      const mx = x + w * r;
      renderCartNode(node.children[0], x,  y, mx - x,       h, parent);
      renderCartNode(node.children[1], mx, y, (x + w) - mx, h, parent);
    }
  }
}

function renderCart() {
  const total = [...CART.values()].reduce((s, n) => s + n, 0);
  document.getElementById('lib-cart-count').textContent =
    `${total} panel${total !== 1 ? 'es' : ''}`;
  document.getElementById('lib-cart-design').disabled = total === 0;
  updateFab();

  if (total === 0) {
    _cartCanvas.style.display = 'none';
    _cartEmpty.style.display  = 'block';
    return;
  }
  _cartEmpty.style.display  = 'none';
  _cartCanvas.style.display = 'block';

  // Expand cart map to image list (repeated per count)
  const cartImgs = [];
  CART.forEach((count, id) => {
    for (let i = 0; i < count; i++) {
      cartImgs.push({ ...IMAGES[id] });
    }
  });

  // Size the canvas first so we know the target aspect ratio
  const { w, h } = fitCartCanvas();
  const targetR = w / h;

  const { root } = computeAutoLayout(
    cartImgs.map(img => ({ ...img, ratio: Math.max(0.1, img.ratio || 1) })),
    targetR
  );

  _cartCanvas.innerHTML = '';
  const m = 3;
  renderCartNode(root, m, m, w - 2 * m, h - 2 * m, _cartCanvas);
}

// ══════════════════════════════════════════════════════
//  NAVIGATE TO DESIGNER
// ══════════════════════════════════════════════════════
function goToDesigner() {
  if (!CART.size) return;
  _persistCart(); // already up-to-date, but ensure final state is saved
  (window.top || window).location.href = (window._appBase || '') + '/designer';
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => { relayout(false); renderCart(); }, 150);
});

document.getElementById('lib-filter-sel').addEventListener('change', e => {
  activeFilter = e.target.value;
  relayout(false);
});
document.getElementById('lib-search').addEventListener('input', () => relayout(false));
document.getElementById('lib-mezclar').addEventListener('click',   () => relayout(true));
document.getElementById('lib-cart-clear').addEventListener('click', cartClear);
document.getElementById('lib-cart-design').addEventListener('click', goToDesigner);

document.getElementById('lib-cart-fab').addEventListener('click', openSheet);
document.getElementById('lib-sheet-close').addEventListener('click', closeSheet);
document.getElementById('lib-sheet-overlay').addEventListener('click', closeSheet);
document.getElementById('lib-sheet-clear').addEventListener('click', () => { cartClear(); closeSheet(); });
document.getElementById('lib-sheet-design').addEventListener('click', goToDesigner);

probeImages(() => {
  buildFilter();
  relayout(true);
  renderCart();
});
</script>
