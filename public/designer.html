  let _logoBox = null, _logoSz = null, _logoCenter = null;

  function _setupLogo(box, size, center) {
    _logoBox = box; _logoSz = size; _logoCenter = center;
    const img = new Image();
    img.onload = () => {
      _logoImg = img;
      const asp = img.naturalWidth / img.naturalHeight || 1;
      _logoCanvas.width  = 256;
      _logoCanvas.height = Math.max(1, Math.round(256 / asp));
      _logoTex = new THREE.CanvasTexture(_logoCanvas);
      _logoTex.anisotropy = _maxAniso;
      _drawLogo();
      _buildLogoMesh();
    };
    img.onerror = () => {};
    img.src = LOGO_URL;
  }

  function _buildLogoMesh() {
    if (!_logoTex || !_logoBox) return;
    const box = _logoBox, size = _logoSz, center = _logoCenter;
    const asp = _logoCanvas.width / Math.max(1, _logoCanvas.height);

    // Tamaño: parche pequeño en el pecho (~15% del ancho de la camisa)
    const lw = size.x * 0.15;
    const lh = lw / asp;

    // Posición: pecho derecho del portador, parte frontal.
    // Tras model.rotation.y=π: frente = box.min.z, portador-derecha = -X world.
    const lx = -(box.max.x * 0.30);
    const ly = center.y  + size.y * 0.20;
    const lz = box.min.z;

    if (_logoMesh) { _scene.remove(_logoMesh); _logoMesh.geometry.dispose(); _logoMesh = null; }

    const mat = new THREE.MeshBasicMaterial({
      map: _logoTex, transparent: true,
      depthTest: true, depthWrite: false,
      polygonOffset: true, polygonOffsetFactor: -6,
    });

    if (_useDecal && _shirtMeshRef && THREE.DecalGeometry) {
      _shirtMeshRef.updateWorldMatrix(true, false);
      const pos     = new THREE.Vector3(lx, ly, lz);
      const ori     = new THREE.Euler(0, Math.PI, 0); // normal hacia -Z (frente de camisa)
      const decSize = new THREE.Vector3(lw, lh, size.z * 0.4);
      try {
        _logoMesh = new THREE.Mesh(new THREE.DecalGeometry(_shirtMeshRef, pos, ori, decSize), mat);
        _scene.add(_logoMesh);
        return;
      } catch(e) {
        console.warn('Logo DecalGeometry failed, using plane:', e);
      }
    }

    // Fallback: plano flotante
    _logoMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), mat);
    _logoMesh.rotation.y = Math.PI;
    _logoMesh.scale.set(lw, lh, 1);
    _logoMesh.position.set(lx, ly, lz - 0.003);
    _scene.add(_logoMesh);
  }

  function setLogoFilter(filter) {
    _logoFilter = filter;
    _drawLogo();
  }

  // ── Fallback procedural shirt ────────────────────────────────────
  function _buildFallbackShirt(err) {
    if (err) console.warn('GLB load failed, using fallback shirt:', err);
    const s = new THREE.Shape();
    const bw=1.0, bb=-1.4, sy=0.55, sw_=0.50, sty=0.30, cy=1.0, cw=0.22, cd=0.20;
    s.moveTo(-bw, bb); s.lineTo( bw, bb); s.lineTo( bw, sy);
    s.lineTo( bw+sw_, sy-0.04); s.lineTo( bw+sw_, sy-0.04+sty);
    s.lineTo( bw,    sy+sty-0.09); s.lineTo( cw, cy);
    s.bezierCurveTo(cw, cy-cd, -cw, cy-cd, -cw, cy);
    s.lineTo(-bw, sy+sty-0.09); s.lineTo(-bw-sw_, sy-0.04+sty);
    s.lineTo(-bw-sw_, sy-0.04); s.lineTo(-bw, sy); s.lineTo(-bw, bb);
    _shirtMats = [];
    const _fbMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(_shirtColor), roughness: 0.85, metalness: 0.0
    });
    _shirtMats.push(_fbMat);
    const shirt = new THREE.Mesh(
      new THREE.ExtrudeGeometry(s, { depth: 0.05, bevelEnabled: false }), _fbMat
    );
    _scene.add(shirt);
    _baseY = -0.28; _printZ = 0.062; _printMaxW = 0.94; _printMaxH = 1.10;
    _shirtW = 2.47; _shirtH = 2.50; _shirtCY = -0.655;
    _useDecal = false;
    _setupPrintPlane();
    document.getElementById('tshirt-loading').style.display = 'none';
    redrawPrint(Store.state);
  }

  // ── Main init ─────────────────────────────────────────────────────
  function init() {
    const vp = document.getElementById('tshirt-viewport');
    if (!vp || !window.THREE) return;

    _printCanvas = document.createElement('canvas');
    _printCanvas.width = 1050; _printCanvas.height = 1650;  // 7×11 × 150px
    _printCtx = _printCanvas.getContext('2d');

    _scene = new THREE.Scene();
    _scene.background = new THREE.Color(0xdadada);

    const W = vp.clientWidth || 500, H = vp.clientHeight || 600;
    _cam = new THREE.PerspectiveCamera(34, W / H, 0.05, 100);
    const _isMobile = window.innerWidth < 768;
    _cam.position.set(0, _isMobile ? 0.28 : 0.1, _isMobile ? 2.3 : 1.3);

    _ren = new THREE.WebGLRenderer({ antialias: true });
    _ren.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    _ren.setSize(W, H);
    vp.appendChild(_ren.domElement);
    _maxAniso = _ren.capabilities.getMaxAnisotropy();

    // Key desde el frente del modelo (world -Z), posiciones ajustadas
    _scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const key = new THREE.DirectionalLight(0xffffff, 0.5);
    key.position.set(1, 3, -5); _scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 0.5);
    fill.position.set(-2, 0.5, 3); _scene.add(fill);

    _printTex = new THREE.CanvasTexture(_printCanvas);
    _printTex.anisotropy   = _maxAniso;
    _printTex.magFilter    = THREE.LinearFilter;
    _printTex.minFilter    = THREE.LinearMipmapLinearFilter;
    _printTex.generateMipmaps = true;

    _ctrl = new THREE.OrbitControls(_cam, _ren.domElement);
    _ctrl.enablePan = false;
    _ctrl.minDistance = 0.12;
    _ctrl.maxDistance = 10;
    _ctrl.enableDamping = true;
    _ctrl.dampingFactor = 0.06;
    _ctrl.autoRotate = false;
    _ctrl.autoRotateSpeed = 12.0;
    _ctrl.target.set(0, 0, 0);
    _ctrl.update();

    // Mini secondary view (opposite side)
    const miniCanvas = document.getElementById('tshirt-mini');
    if (miniCanvas) {
      _miniRen = new THREE.WebGLRenderer({ canvas: miniCanvas, antialias: true, alpha: false });
      _miniRen.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      _miniRen.setSize(miniCanvas.clientWidth || 110, miniCanvas.clientHeight || 140);
      _miniRen.setClearColor(0xdadada, 1);
      const mW = miniCanvas.clientWidth || 110, mH = miniCanvas.clientHeight || 140;
      _miniCam = new THREE.PerspectiveCamera(34, mW / mH, 0.05, 100);
    }

    (function loop() {
      requestAnimationFrame(loop);
      _ctrl.update();
      _ren.render(_scene, _cam);
      // Mini view: camera at antipodal position (flip X and Z relative to target)
      if (_miniRen && _miniCam) {
        const t = _ctrl.target;
        const dx = _cam.position.x - t.x;
        const dy = _cam.position.y - t.y;
        const dz = _cam.position.z - t.z;
        _miniCam.position.set(t.x - dx, t.y + dy, t.z - dz);
        _miniCam.lookAt(t);
        _miniRen.render(_scene, _miniCam);
      }
    })();

    // Load GLB
    if (window.THREE && THREE.GLTFLoader) {
      const loader = new THREE.GLTFLoader();
      loader.load(GLB_URL, gltf => {
        const model = gltf.scene;
        model.rotation.y = Math.PI;   // back toward camera

        _shirtMats = [];
        model.traverse(child => {
          if (child.isMesh) {
            const mat = new THREE.MeshStandardMaterial({
              color: new THREE.Color(_shirtColor), roughness: 0.85, metalness: 0.0,
            });
            child.material = mat;
            _shirtMats.push(mat);
          }
        });
        _maleModel = model;
        _scene.add(model);

        // Derive print bounds from bounding box
        const box    = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        const size   = new THREE.Vector3();
        box.getCenter(center); box.getSize(size);
        _baseY      = center.y + size.y * 0.15;
        _printZ     = box.max.z - size.z * 0.05;
        _shirtDepth = size.z;
        // Dimensiones reales del modelo para proyección 2D
        _shirtW  = size.x;
        _shirtH  = size.y;
        _shirtCY = center.y;
        // Limitar el área de estampado al panel trasero (sin sobrepasar laterales/hombros)
        _printMaxW  = size.x * 0.38;
        _printMaxH  = size.y * 0.44;
        // Cintura: calculado DESPUÉS de actualizar _printMaxH.
        // Factor 0.5 = al borde inferior natural del estampado → masking activa al bajar.
        // Factor 0.7: recorte activa ~25% abajo del centro — subir para recortar antes, bajar para después
        _waistY = _baseY - _printMaxH * 0.7;

        // Mesh with max Z = shirt back after rotation.y=π
        let _bestZ = -Infinity;
        model.traverse(child => {
          if (child.isMesh) {
            const mb = new THREE.Box3().setFromObject(child);
            if (mb.max.z > _bestZ) { _bestZ = mb.max.z; _maleMeshRef = child; }
          }
        });
        _shirtMeshRef = _maleMeshRef;

        _useDecal = !!THREE.DecalGeometry;
        _lastPropW = PROP_W; _lastPropH = PROP_H;
        if (_useDecal) _rebuildDecal();
        else           _setupPrintPlane();
        // _shirtMeshRef y _useDecal ya están listos; img.onload es async así que
        // _buildLogoMesh() dentro del callback usará los valores correctos.
        _setupLogo(box, size, center);

        document.getElementById('tshirt-loading').style.display = 'none';
        setTimeout(() => redrawPrint(Store.state), 300);
        setTimeout(() => redrawPrint(Store.state), 1200);
      }, undefined, _buildFallbackShirt);
    } else {
      _buildFallbackShirt(null);
    }

    Store.subscribe(state => {
      redrawPrint(state);
      _updatePrintScale();
      // If any thumb images aren't loaded yet, redraw once they are
      document.querySelectorAll('.thumb img').forEach(img => {
        if (!img.complete || !img.naturalWidth) {
          img.addEventListener('load', () => redrawPrint(Store.state), { once: true });
        }
      });
    });

    new ResizeObserver(() => {
      const w = vp.clientWidth, h = vp.clientHeight;
      if (!w || !h) return;
      _cam.aspect = w / h; _cam.updateProjectionMatrix(); _ren.setSize(w, h);
    }).observe(vp);

    // ── Drag estampado: hover sobre el estampado → cursor move, arrastrar lo mueve ──
    {
      const _ray = new THREE.Raycaster();
      let _printDrag = false, _pdX = 0, _pdY = 0, _pdOx = 0, _pdOy = 0;

      // Lanza un rayo y devuelve true si intersecta el print mesh activo
      function _printHit(e) {
        const mesh = _useDecal ? _decalMesh : _printPlane;
        if (!mesh || !_cam || !_ren) return false;
        const el   = _ren.domElement;
        const rect = el.getBoundingClientRect();
        _ray.setFromCamera({
          x:  ((e.clientX - rect.left) / rect.width)  * 2 - 1,
          y: -((e.clientY - rect.top)  / rect.height) * 2 + 1
        }, _cam);
        return _ray.intersectObject(mesh, false).length > 0;
      }

      // Hover: cursor cambia a "move" cuando el ratón está sobre el estampado
      _ren.domElement.addEventListener('pointermove', e => {
        if (_printDrag) return;
        _ren.domElement.style.cursor = _printHit(e) ? 'move' : '';
      });

      // pointerdown en capture phase: si está sobre el estampado → tomamos el evento
      // Si NO está sobre el estampado → no llamamos stopPropagation → OrbitControls orbita
      _ren.domElement.addEventListener('pointerdown', e => {
        if (e.button !== 0 || !_printHit(e)) return;
        e.stopImmediatePropagation();
        e.preventDefault();
        _ctrl.enabled = false;
        _printDrag = true;
        _pdX = e.clientX; _pdY = e.clientY;
        _pdOx = _offX;   _pdOy = _offY;
        _ren.domElement.setPointerCapture(e.pointerId);
      }, { capture: true });

      // pointermove en capture phase
      _ren.domElement.addEventListener('pointermove', e => {
        if (!_printDrag) return;
        const scale = 0.5 / Math.max(vp.clientWidth, 1);
        _offX = Math.max(-0.4, Math.min(0.4, _pdOx + (e.clientX - _pdX) * scale));
        _offY = Math.max(-0.4, Math.min(0.4, _pdOy - (e.clientY - _pdY) * scale));
        document.getElementById('print-x').value = Math.round(_offX * 100);
        document.getElementById('print-y').value = Math.round(_offY * 100);
        if (_useDecal) _rebuildDecal(); else _updatePlaneScale();
        redrawPrint(Store.state);
        _notifyOffset();
      }, { capture: true });

      ['pointerup', 'pointercancel'].forEach(ev =>
        _ren.domElement.addEventListener(ev, () => {
          if (!_printDrag) return;
          _printDrag = false;
          _ctrl.enabled = true;
          _ren.domElement.style.cursor = '';
        }, { capture: true })
      );
    }

    document.getElementById('btn-reset-print').addEventListener('click', () => {
      _offX = _offY = 0; _printScale = 1.0;
      document.getElementById('print-size').value = 100;
      document.getElementById('print-x').value = 0;
      document.getElementById('print-y').value = 0;
      if (_useDecal) _rebuildDecal();
      else           _updatePlaneScale();
      _notifyOffset();
    });

    setTimeout(() => redrawPrint(Store.state), 400);
  }

  function setShirtColor(hex) {
    _shirtColor = hex;
    _shirtMats.forEach(m => m.color.setStyle(hex));
  }

  function zoomIn() {
    const v    = _cam.position.clone().sub(_ctrl.target);
    const dist = Math.max(_ctrl.minDistance, v.length() * 0.8);
    _cam.position.copy(_ctrl.target).addScaledVector(v.normalize(), dist);
  }
  function zoomOut() {
    const v    = _cam.position.clone().sub(_ctrl.target);
    const dist = Math.min(_ctrl.maxDistance, v.length() * 1.25);
    _cam.position.copy(_ctrl.target).addScaledVector(v.normalize(), dist);
  }

  function syncPrint() {
    _updatePrintScale();
    redrawPrint(Store.state);
  }

  function setPanelRotation(deg) {
    _panelRotDeg = parseFloat(deg) || 0;
    if (_useDecal) _rebuildDecal();
    else           _updatePlaneScale();
    redrawPrint(Store.state);
  }

  let _onOffsetChange = null;  // callback(newX, newY, deltaX, deltaY)
  let _prevOffX = 0, _prevOffY = 0;
  function _notifyOffset() {
    if (!_onOffsetChange) return;
    const dx = _offX - _prevOffX, dy = _offY - _prevOffY;
    _prevOffX = _offX; _prevOffY = _offY;
    _onOffsetChange(_offX, _offY, dx, dy);
  }

  function setOffset(x, y) {
    _offX = x; _offY = y;
    document.getElementById('print-x').value = Math.round(x * 100);
    document.getElementById('print-y').value = Math.round(y * 100);
    if (_useDecal) _rebuildDecal();
    else           _updatePlaneScale();
    redrawPrint(Store.state);
    _notifyOffset();
  }

  function setScale(s) {
    _printScale = s;
    document.getElementById('print-size').value = Math.round(s * 100);
    if (_useDecal) _rebuildDecal();
    else           _updatePlaneScale();
    redrawPrint(Store.state);
  }

  return {
    init, redrawPrint, setShirtColor, zoomIn, zoomOut, syncPrint, setLogoFilter, setPanelRotation,
    onOffsetChange: cb => { _onOffsetChange = cb; },
    getOffset:      () => ({ x: _offX, y: _offY }),
    setOffset,
    setScale,
    /** Devuelve los parámetros necesarios para proyectar el área de impresión al wrapper 2D */
    getShirtLayout: () => ({
      shirtW:  _shirtW,               // ancho total de la camisa (world units)
      shirtH:  _shirtH,               // alto total de la camisa
      shirtCY: _shirtCY,              // centro Y de la camisa en world coords
      printW:  _printMaxW * _printScale,
      printH:  _printMaxH * _printScale,
      offX: _offX,                    // desplazamiento X del área de impresión
      offY: _offY,                    // desplazamiento Y
      baseY: _baseY,                  // posición Y base del área de impresión
    }),
    /** Superficie máxima de impresión (world units) y escala actual */
    getPrintSurface: () => ({ maxW: _printMaxW, maxH: _printMaxH, scale: _printScale }),
    /** Dimensiones actuales del decal (panel proyectado en la camisa) */
    getDecalDims: () => _getDecalDims(),
    /** Alterna la rotación automática horizontal; devuelve el nuevo estado */
    cycleAutoRotate: () => {
      if (!_ctrl.autoRotate) {
        _ctrl.autoRotate = true;
        _ctrl.autoRotateSpeed = 12.0;
        return 1; // girando →
      } else if (_ctrl.autoRotateSpeed > 0) {
        _ctrl.autoRotateSpeed = -12.0;
        return -1; // girando ←
      } else {
        _ctrl.autoRotate = false;
        return 0; // detenido
      }
    },
  };
})();

const BG_PALETTE = [
  { color: '#1a1a1a', label: 'Negro' },
  { color: '#1e3a28', label: 'Verde' },
  { color: '#d5f0ea', label: 'Menta' },
  { color: '#f5f0e8', label: 'Crema' },
];

/** Luminancia perceptual (0=negro, 1=blanco). */
function hexLuminance(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  return 0.299 * r + 0.587 * g + 0.114 * b;
}

function closeBgDropdown() {
  const dd = document.querySelector('.bg-dd');
  if (dd) dd.classList.remove('open');
}

function applyBgColor(color, label) {
  CURRENT_BG = color;
  try { localStorage.setItem('panel-bg-color', color); } catch(e) {}
  const dark = hexLuminance(color) < 0.35;
  const filter = dark ? 'invert(1)' : '';
  document.documentElement.style.setProperty('--canvas-bg', color);
  document.documentElement.style.setProperty('--cell-bg', color);
  document.documentElement.style.setProperty('--img-filter', filter || 'none');
  // Actualizar botón
  const _bgBtn = document.getElementById('bg-btn');
  if (_bgBtn) {
    _bgBtn.style.background   = color;
    _bgBtn.style.borderColor  = hexLuminance(color) < 0.35 ? '#666' : '#bbb';
  }
  // Sync active row in dropdown
  document.querySelectorAll('.cswatch-row').forEach(r => r.classList.remove('active'));
  const activeRow = document.querySelector(`.cswatch-row[data-color="${CSS.escape(color)}"]`);
  if (activeRow) activeRow.classList.add('active');
  // Forzar actualización directa en thumbnails
  document.querySelectorAll('.thumb').forEach(t => {
    t.style.background = color;
    const img = t.querySelector('img');
    if (img) img.style.filter = filter;
  });
  Renderer.render(Store.state);
  TshirtPreview.redrawPrint();
  TshirtPreview.setShirtColor(color);
  TshirtPreview.setLogoFilter(filter || 'none');
  document.querySelectorAll('.shirt-swatch').forEach(s => s.classList.remove('active'));
  closeBgDropdown();
}

function buildBgDropdown() {
  const wrapper = document.getElementById('bg-wrapper');
  const dd = document.createElement('div');
  dd.className = 'bg-dd';

  const grid = document.createElement('div');
  grid.className = 'bg-dd-grid';

  const lightColors = BG_PALETTE.filter(p => hexLuminance(p.color) >= 0.35);
  const darkColors  = BG_PALETTE.filter(p => hexLuminance(p.color) <  0.35);

  function addRow(palette, isFirst) {
    palette.forEach(({ color, label }, i) => {
      const row = document.createElement('div');
      row.className = 'cswatch-row' + (isFirst && i === 0 ? ' active' : '');
      row.dataset.color = color;
      row.innerHTML = `<div class="cswatch" style="background:${color}"></div>
                       <span class="cswatch-lbl">${label}</span>`;
      row.addEventListener('click', () => applyBgColor(color, label));
      grid.appendChild(row);
    });
  }

  addRow(lightColors, true);

  const sep = document.createElement('div');
  sep.className = 'bg-sep';
  grid.appendChild(sep);

  addRow(darkColors, false);

  dd.appendChild(grid);
  dd.addEventListener('click', e => e.stopPropagation());
  wrapper.appendChild(dd);
}

// Celda destino cuando el usuario usa el botón + de una celda vacía
let _pendingCellId = null;

function _setPendingCellId(nodeId) {
  _pendingCellId = nodeId;
  document.body.classList.toggle('pending-assign', nodeId !== null);
  if (nodeId !== null) {
    Renderer.render(Store.state); // re-render para marcar la celda destino
    const mainEl = document.getElementById('main');
    const tabBar = document.getElementById('mobile-tab-bar');
    if (window.innerWidth < 768) {
      if (mainEl) mainEl.dataset.tab = 'imagenes';
      if (tabBar) {
        tabBar.querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
        tabBar.querySelector('.mtab[data-tab="imagenes"]')?.classList.add('active');
      }
    } else {
      const gallery = document.getElementById('gallery');
      if (gallery) gallery.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  } else {
    Renderer.render(Store.state);
  }
}

function _clearPendingCellId() {
  if (_pendingCellId !== null) _setPendingCellId(null);
}

// Encuentra la primera celda vacía (leaf con imageId=null) recorriendo el árbol
function _findFirstEmptyCellId(node) {
  if (!node) return null;
  if (node.type === 'leaf') return node.imageId === null ? node.id : null;
  if (node.children) {
    for (const c of node.children) {
      const r = _findFirstEmptyCellId(c);
      if (r !== null) return r;
    }
  }
  return null;
}

// Si el árbol cambia y la celda pendiente dejó de existir (o ya no es leaf vacío), limpiar
function _validatePendingCellId() {
  if (_pendingCellId === null) return;
  const node = PM.find(Store.state.root, _pendingCellId);
  if (!node || node.type !== 'leaf' || node.imageId !== null) {
    _pendingCellId = null;
    document.body.classList.remove('pending-assign');
  }
}

/** Creates a thumb div for one image and appends it to grid. */
function _addThumb(img, grid) {
  const thumb = document.createElement('div');
  thumb.className = 'thumb';
  thumb.dataset.imgId = img.id;

  const el = document.createElement('img');
  el.alt = img.lbl;
  // Load immediately (not lazy) — _bsp needs naturalWidth to render on t-shirt
  _loadImg(el, img.src);

  const lbl = document.createElement('div');
  lbl.className = 'thumb-lbl';
  lbl.textContent = img.lbl;

  const delBtn = document.createElement('button');
  delBtn.className = 'thumb-del';
  delBtn.title = 'Quitar panel';
  delBtn.textContent = '×';
  delBtn.addEventListener('click', e => { e.stopPropagation(); _removeFromGallery(img.id); });

  thumb.appendChild(el);
  thumb.appendChild(lbl);
  thumb.appendChild(delBtn);

  // Double-click → rotation popover
  thumb.addEventListener('dblclick', e => {
    e.stopPropagation(); e.preventDefault();
    thumb.querySelector('.rot-popover')?.remove();
    const pop = document.createElement('div');
    pop.className = 'rot-popover';
    const btnM = document.createElement('button'); btnM.textContent = '↺'; btnM.title = '-15°';
    const numI = document.createElement('input');  numI.type = 'number'; numI.min = 0; numI.max = 359; numI.value = img.rotation || 0;
    const btnP = document.createElement('button'); btnP.textContent = '↻'; btnP.title = '+15°';
    const btnX = document.createElement('button'); btnX.className = 'rot-pop-close'; btnX.textContent = '✕';
    function applyRot(deg) {
      img.rotation = ((Math.round(deg) % 360) + 360) % 360;
      numI.value = img.rotation;
      el.style.transform = img.rotation ? `rotate(${img.rotation}deg)` : '';
      Renderer.render(Store.state);
      TshirtPreview.redrawPrint();
    }
    btnM.addEventListener('click', ev => { ev.stopPropagation(); applyRot((img.rotation || 0) - 15); });
    btnP.addEventListener('click', ev => { ev.stopPropagation(); applyRot((img.rotation || 0) + 15); });
    numI.addEventListener('change', ev => { ev.stopPropagation(); applyRot(parseInt(numI.value) || 0); });
    numI.addEventListener('click',  ev => ev.stopPropagation());
    btnX.addEventListener('click',  ev => { ev.stopPropagation(); pop.remove(); });
    pop.append(btnM, numI, btnP, btnX);
    thumb.appendChild(pop);
    setTimeout(() => {
      document.addEventListener('pointerdown', function oc(ev) {
        if (!pop.contains(ev.target)) { pop.remove(); document.removeEventListener('pointerdown', oc); }
      });
    }, 0);
  });

  // Drag con protección anti-scroll: solo permite drag si el gesto es horizontal.
  // Evita que al deslizar verticalmente la galería se arrastre la imagen por accidente.
  thumb.setAttribute('draggable', 'true');
  let _tStartX = 0, _tStartY = 0, _tDragOk = true;
  thumb.addEventListener('pointerdown', e => {
    _tStartX = e.clientX; _tStartY = e.clientY; _tDragOk = true;
  });
  thumb.addEventListener('pointermove', e => {
    if (!_tDragOk) return;
    const dx = Math.abs(e.clientX - _tStartX);
    const dy = Math.abs(e.clientY - _tStartY);
    if (dy > 4 && dy > dx) _tDragOk = false;
  });
  thumb.addEventListener('dragstart', e => {
    if (!_tDragOk) { e.preventDefault(); return; }
    e.dataTransfer.setData('text/plain', String(img.id));
    e.dataTransfer.effectAllowed = 'copy';
    thumb.classList.add('dragging');
  });
  thumb.addEventListener('dragend', () => thumb.classList.remove('dragging'));

  // Tap/click → asignar a celda o incrementar count (un solo disparo touch + mouse)
  function _handleThumbTap() {
    const wasPending = _pendingCellId !== null;
    // Prioridad: 1) celda con botón + pendiente, 2) celda seleccionada, 3) primera vacía
    let targetId = _pendingCellId;
    if (!targetId) targetId = Store.state.selectedId;
    if (!targetId) targetId = _findFirstEmptyCellId(Store.state.root);

    const node = targetId ? PM.find(Store.state.root, targetId) : null;
    if (node && node.type === 'leaf') {
      Store.dispatch({ type: 'ASSIGN', nodeId: targetId, imageId: img.id });
      if (wasPending) {
        _pendingCellId = null;
        document.body.classList.remove('pending-assign');
        if (window.innerWidth < 768) {
          const mainEl = document.getElementById('main');
          const tabBar = document.getElementById('mobile-tab-bar');
          if (mainEl) mainEl.dataset.tab = 'editor';
          if (tabBar) {
            tabBar.querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
            tabBar.querySelector('.mtab[data-tab="editor"]')?.classList.add('active');
          }
        }
      }
    } else {
      setImageCount(img.id, (IMAGE_COUNTS.get(img.id) || 0) + 1);
    }
  }
  // Listener único en pointerup para dispar inmediatamente en touch (sin delay iOS)
  thumb.addEventListener('pointerup', e => {
    if (!_tDragOk) return;   // fue un scroll, no un tap
    if (thumb.classList.contains('dragging')) return;  // fue un drag HTML5
    if (e.target.closest('.thumb-del, .rot-popover')) return;  // tocó X o popover
    _handleThumbTap();
  });

  grid.appendChild(thumb);
}

/** Remove one panel from gallery, IMAGE_COUNTS, and localStorage cart */
function _removeFromGallery(imgId) {
  setImageCount(imgId, 0);
  document.querySelector(`#gallery-grid .thumb[data-img-id="${imgId}"]`)?.remove();
  try {
    const cart = JSON.parse(localStorage.getItem('panel-design-cart') || '{}');
    delete cart[String(imgId)];
    localStorage.setItem('panel-design-cart', JSON.stringify(cart));
  } catch(e) {}
  if (IMAGE_COUNTS.size > 0) {
    setTimeout(() => AutoLayout.generateDirect([]), 50);
  } else {
    Store.dispatch({ type: 'SET_ROOT', root: PM.leaf() });
    fitCanvas();
  }
  TshirtPreview.redrawPrint();
}

/** Re-sync gallery after biblioteca overlay closes */
function _refreshGallery() {
  let newCartData = null;
  try { newCartData = JSON.parse(localStorage.getItem('panel-design-cart') || 'null'); } catch(e) {}
  const newIds = new Set(newCartData ? Object.keys(newCartData).map(Number) : []);

  const grid = document.getElementById('gallery-grid');
  const addBtn = grid.querySelector('.add-panels-btn');

  // Remove deselected thumbs
  grid.querySelectorAll('.thumb[data-img-id]').forEach(t => {
    if (!newIds.has(parseInt(t.dataset.imgId))) {
      setImageCount(parseInt(t.dataset.imgId), 0);
      t.remove();
    }
  });

  // Add newly selected panels (before the + button)
  const currentIds = new Set([...grid.querySelectorAll('.thumb[data-img-id]')].map(t => parseInt(t.dataset.imgId)));
  if (addBtn) grid.removeChild(addBtn);
  newIds.forEach(id => {
    if (!currentIds.has(id)) {
      const img = IMAGES.find(i => i.id === id);
      if (img) _addThumb(img, grid);
    }
  });
  if (addBtn) grid.appendChild(addBtn);

  // Update counts
  newIds.forEach(id => {
    const n = parseInt(newCartData?.[String(id)], 10) || 1;
    setImageCount(id, n);
  });

  // Si el usuario tiene una celda pendiente (+), NO auto-regenerar todo el layout:
  // respetar su elección de llenar solo esa celda. Solo re-render la galería.
  if (_pendingCellId !== null) {
    Renderer.render(Store.state);
    return;
  }

  // Regenerate layout when selection changed
  if (newIds.size > 0) setTimeout(() => AutoLayout.generateDirect([]), 50);
  else fitCanvas();
}

function initGallery() {
  document.getElementById('gallery-loading').style.display = 'none';
  const grid = document.getElementById('gallery-grid');

  // Read cart (shared with biblioteca) — do NOT delete it; keep for persistence
  let _cartData = null;
  try { _cartData = JSON.parse(localStorage.getItem('panel-design-cart') || 'null'); } catch(e) {}

  const _cartIds = new Set(
    _cartData ? Object.keys(_cartData).map(k => parseInt(k)) : []
  );

  // Show only panels the user selected in biblioteca (empty if entering directly)
  const galleryImages = IMAGES.filter(img => _cartIds.has(img.id));
  galleryImages.forEach(img => _addThumb(img, grid));

  // Biblioteca overlay setup
  const _bibOverlay = document.getElementById('bib-overlay');
  const _bibIframe  = document.getElementById('bib-iframe');
  // Load /biblioteca.html directly to bypass EverShop layout and prevent nested iframes
  const _bibBase    = (window._appBase || '') + '/biblioteca.html';

  // Preload in background immediately
  _bibIframe.src = _bibBase;

  let _bibClosing = false;
  function _closeBib() {
    if (_bibClosing) return;
    _bibClosing = true;
    _bibOverlay.classList.remove('open');
    _refreshGallery();
    setTimeout(() => { _bibClosing = false; }, 400);
  }
  function _openBib() {
    _bibOverlay.classList.add('open');
    // Tell the live iframe to sync its in-memory cart from localStorage
    // (reflects any panel deletions made in the gallery sidebar)
    try { _bibIframe.contentWindow.postMessage({ type: 'biblioteca:sync' }, '*'); } catch(e) {}
  }

  document.getElementById('bib-overlay-close').addEventListener('click', _closeBib);
  _bibOverlay.addEventListener('click', e => { if (e.target === _bibOverlay) _closeBib(); });

  // Primary signal: postMessage from iframe
  window.addEventListener('message', e => {
    if (e.data?.type === 'biblioteca:done') _closeBib();
  });
  // Fallback signal: storage event (fires cross-frame on same origin)
  window.addEventListener('storage', e => {
    if (e.key === 'biblioteca:signal') _closeBib();
  });

  // "+" button — opens biblioteca overlay
  const addBtn = document.createElement('div');
  addBtn.className = 'add-panels-btn';
  addBtn.title = 'Agregar paneles desde la biblioteca';
  addBtn.innerHTML = '<span class="add-icon">+</span><span class="add-lbl">Agregar paneles</span>';
  addBtn.addEventListener('click', _openBib);
  grid.appendChild(addBtn);

  // Gallery search filter
  document.getElementById('gallery-search').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    grid.querySelectorAll('.thumb[data-img-id]').forEach(t => {
      const lbl = t.querySelector('.thumb-lbl')?.textContent?.toLowerCase() || '';
      t.style.display = (!q || lbl.includes(q)) ? '' : 'none';
    });
  });

  // Clear-all button
  document.getElementById('gallery-clear-all').addEventListener('click', () => {
    if (!grid.querySelector('.thumb[data-img-id]')) return;
    if (!confirm('¿Quitar todos los paneles de la selección?')) return;
    [...grid.querySelectorAll('.thumb[data-img-id]')].forEach(t => {
      _removeFromGallery(parseInt(t.dataset.imgId));
    });
  });

  // Pre-populate IMAGE_COUNTS and restore / auto-generate layout when there's a selection
  if (_cartIds.size) {
    galleryImages.forEach(img => {
      const n = parseInt(_cartData[String(img.id)], 10) || 1;
      setImageCount(img.id, n);
    });

    // Try to restore saved canvas state if cart IDs match exactly
    let _restored = false;
    try {
      const saved = JSON.parse(localStorage.getItem('panel-canvas-state') || 'null');
      if (saved?.root && Array.isArray(saved.cartIds)) {
        const savedSet = new Set(saved.cartIds.map(Number));
        const matches = savedSet.size === _cartIds.size && [...savedSet].every(id => _cartIds.has(id));
        if (matches) {
          _restored = true;
          setTimeout(() => {
            if (saved.propW > 0) PROP_W = saved.propW;
            if (saved.propH > 0) PROP_H = saved.propH;
            fitCanvas();   // contain-fit canvas with restored proportion, then render
            Store.dispatch({ type: 'SET_ROOT', root: saved.root });
          }, 50);
        }
      }
    } catch(e) {}

    if (!_restored) {
      setTimeout(() => AutoLayout.generateDirect([]), 50);
    }
  }

  // Apply active color/filter to newly created thumbnails
  const _activePalette = BG_PALETTE.find(p => p.color === CURRENT_BG);
  applyBgColor(CURRENT_BG, _activePalette?.label);

  // Highlight the thumb of the selected cell's image
  Store.subscribe(state => {
    grid.querySelectorAll('.thumb').forEach(t => t.classList.remove('hi'));
    if (state.selectedId) {
      const node = PM.find(state.root, state.selectedId);
      if (node && node.imageId !== null) {
        const t = grid.querySelector(`[data-img-id="${node.imageId}"]`);
        if (t) t.classList.add('hi');
      }
    }
  });

  // "Agregar paneles" button inside empty canvas placeholder
  document.getElementById('canvas').addEventListener('click', e => {
    if (e.target.closest('[data-action="open-bib"]')) _openBib();
  });
}

// ══════════════════════════════════════════════════════
//  CANVAS SIZING
// ══════════════════════════════════════════════════════
let _panoramaH = 0; // always 0 — no panorama scroll mode

/**
 * Size the canvas using contain-fitting: maintains PROP_W/PROP_H aspect ratio,
 * fills at least one wrapper dimension, is centered.
 * Does NOT render — call Renderer.render() separately if needed.
 */
function _sizeCanvas() {
  const wrapper = document.getElementById('canvas-wrapper');
  const canvas  = document.getElementById('canvas');
  const pad     = 44;
  const availW  = Math.max(wrapper.clientWidth  - pad, 80);
  const availH  = Math.max(wrapper.clientHeight - pad, 80);

  const propR = PROP_W / PROP_H;

  const wrapR   = availW / availH;
  let cW, cH;
  if (propR >= wrapR) {
    cW = availW;
    cH = Math.round(availW / propR);
  } else {
    cH = availH;
    cW = Math.round(availH * propR);
  }
  wrapper.classList.remove('panorama');
  canvas.style.width  = cW + 'px';
  canvas.style.height = cH + 'px';
  Renderer.updateSize();
}

/** Contain-fit canvas to wrapper, then re-render current layout. */
function fitCanvas() {
  _sizeCanvas();
  Renderer.render(Store.state);
}

// ══════════════════════════════════════════════════════
//  UNDO / REDO BUTTON STATE
// ══════════════════════════════════════════════════════
function updateToolbar() {
  document.getElementById('btn-undo').disabled = !Store.canUndo;
  document.getElementById('btn-redo').disabled = !Store.canRedo;
}

// ══════════════════════════════════════════════════════
//  CANVAS STATE PERSISTENCE
// ══════════════════════════════════════════════════════
function _saveCanvasState() {
  try {
    localStorage.setItem('panel-canvas-state', JSON.stringify({
      root:    Store.state.root,
      propW:   PROP_W,
      propH:   PROP_H,
      cartIds: [...IMAGE_COUNTS.keys()]
    }));
  } catch(e) {}
}

// ══════════════════════════════════════════════════════
//  APP INIT
// ══════════════════════════════════════════════════════
(function init() {
  const canvas = document.getElementById('canvas');
  Renderer.init(canvas);
  probeImages(initGallery);   // detecta formatos antes de poblar la galería

  Store.subscribe(state => {
    Renderer.render(state);
    updateToolbar();
    _saveCanvasState();
  });

  // Toolbar
  document.getElementById('btn-clear').addEventListener('click', () => {
    _panoramaH = 0;
    LOCKED_IMAGES.clear();
    Store.dispatch({ type: 'CLEAR' });
    try { localStorage.removeItem('panel-canvas-state'); } catch(e) {}
  });
  document.getElementById('btn-undo').addEventListener('click', () => Store.undo());
  document.getElementById('btn-redo').addEventListener('click', () => Store.redo());

  // Vista limpia (toggle) — oculta divisores, botones y controles del canvas
  document.getElementById('btn-clean-view').addEventListener('click', () => {
    const canvas = document.getElementById('canvas');
    const btn = document.getElementById('btn-clean-view');
    const on = canvas.classList.toggle('clean');
    btn.classList.toggle('active', on);
    btn.textContent = on ? '🙈' : '👁';
    btn.title = on ? 'Volver a vista de edición' : 'Vista limpia (sin controles ni divisiones)';
  });

  // Settings dropdown removed — controls are inline in toolbar

  // Background color dropdown
  buildBgDropdown();
  document.getElementById('bg-btn').addEventListener('click', e => {
    e.stopPropagation();
    const dd = document.querySelector('.bg-dd');
    const r  = e.currentTarget.getBoundingClientRect();
    dd.style.bottom = (window.innerHeight - r.top + 6) + 'px';
    dd.style.top    = 'auto';
    dd.style.right  = (window.innerWidth - r.right) + 'px';
    dd.style.left   = 'auto';
    dd.classList.toggle('open');
  });
  document.addEventListener('click', closeBgDropdown);

  // Deselect on canvas background click
  canvas.addEventListener('click', e => {
    if (e.target === canvas) Store.dispatch({ type: 'SELECT', nodeId: null });
  });

  // Deseleccionar divisor al click fuera (en cualquier parte que no sea un divisor)
  document.addEventListener('click', e => {
    if (_selectedDividerId === null) return;
    if (!e.target.closest('.divider')) {
      _selectedDividerId = null;
      document.querySelectorAll('.divider.selected').forEach(d => d.classList.remove('selected'));
    }
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT') return;

    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); Store.undo(); }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); Store.redo(); }

    if (e.key === 'Delete' || e.key === 'Backspace') {
      const { selectedId } = Store.state;
      if (selectedId) {
        const node = PM.find(Store.state.root, selectedId);
        if (node?.imageId !== null) Store.dispatch({ type: 'UNASSIGN', nodeId: selectedId });
      }
    }
    if (e.key === 'Escape') {
      _clearPendingCellId();
      _selectedDividerId = null;
      document.querySelectorAll('.divider.selected').forEach(d => d.classList.remove('selected'));
      Store.dispatch({ type: 'SELECT', nodeId: null });
    }
  });

  // Responsive resize — re-contain canvas to new wrapper size (debounced)
  let _resizeTimer = null;
  new ResizeObserver(() => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(fitCanvas, 150);
  }).observe(document.getElementById('canvas-wrapper'));

  // Initial render — canvas fills available space
  fitCanvas();
  updateToolbar();

  // Auto-rotate toggle
  document.getElementById('btn-autorotate').addEventListener('click', () => {
    const btn = document.getElementById('btn-autorotate');
    const state = TshirtPreview.cycleAutoRotate();
    btn.classList.toggle('active', state !== 0);
    btn.textContent = state === -1 ? '↺' : '↻';
    btn.title = state === 1 ? 'Girando → (clic para invertir)' : state === -1 ? 'Girando ← (clic para detener)' : 'Activar rotación automática';
  });

  // Stamp position arrow buttons
  const _MOVE_STEP = 0.02;
  document.getElementById('btn-print-up').addEventListener('click', () => {
    const o = TshirtPreview.getOffset();
    TshirtPreview.setOffset(o.x, Math.min(0.4, o.y + _MOVE_STEP));
  });
  document.getElementById('btn-print-down').addEventListener('click', () => {
    const o = TshirtPreview.getOffset();
    TshirtPreview.setOffset(o.x, Math.max(-0.4, o.y - _MOVE_STEP));
  });
  document.getElementById('btn-print-left').addEventListener('click', () => {
    const o = TshirtPreview.getOffset();
    TshirtPreview.setOffset(Math.max(-0.4, o.x - _MOVE_STEP), o.y);
  });
  document.getElementById('btn-print-right').addEventListener('click', () => {
    const o = TshirtPreview.getOffset();
    TshirtPreview.setOffset(Math.min(0.4, o.x + _MOVE_STEP), o.y);
  });

  // Stamp size buttons
  const _SIZE_STEP = 0.1;
  document.getElementById('btn-print-larger').addEventListener('click', () => {
    const ps = TshirtPreview.getPrintSurface();
    TshirtPreview.setScale(Math.min(1.5, ps.scale + _SIZE_STEP));
  });
  document.getElementById('btn-print-smaller').addEventListener('click', () => {
    const ps = TshirtPreview.getPrintSurface();
    TshirtPreview.setScale(Math.max(0.3, ps.scale - _SIZE_STEP));
  });

  // Generar
  document.getElementById('btn-generate').addEventListener('click', () => {
    if (!IMAGES.length) return;
    if (LOCKED_IMAGES.size > 0) _generateWithLocks();
    else AutoLayout.generateDirect([]);
  });

  // ── Mobile: tshirt-controls toggle ────────────────────────────
  document.getElementById('btn-tc-toggle').addEventListener('click', () => {
    document.getElementById('tshirt-controls').classList.toggle('tc-collapsed');
  });

  // ── Mobile: panel divider drag (resize canvas vs tshirt) ──────
  (function() {
    const divider = document.getElementById('panel-divider');
    const cw = document.getElementById('canvas-col');
    const tp = document.getElementById('tshirt-panel');

    divider.addEventListener('pointerdown', e => {
      e.preventDefault();
      const startY  = e.clientY;
      const startCH = cw.getBoundingClientRect().height;
      const startTH = tp.getBoundingClientRect().height;
      const total   = startCH + startTH;

      function move(ev) {
        const dy    = ev.clientY - startY;
        const newCH = Math.max(80, Math.min(total - 80, startCH + dy));
        cw.style.flex   = 'none';
        cw.style.height = newCH + 'px';
        tp.style.flex   = 'none';
        tp.style.height = (total - newCH) + 'px';
        fitCanvas();
      }

      function up() {
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup',   up);
        fitCanvas();
      }

      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup',   up);
    });
  })();

  // ── Canvas resize handles — drag to set proportion ───────────────
  document.querySelectorAll('.rh').forEach(handle => {
    handle.addEventListener('pointerdown', e => {
      e.preventDefault();
      e.stopPropagation();
      const dx = parseInt(handle.dataset.dx, 10);
      const dy = parseInt(handle.dataset.dy, 10);
      const canvas  = document.getElementById('canvas');
      const startX  = e.clientX;
      const startY  = e.clientY;
      const startW  = canvas.clientWidth;
      const startH  = canvas.clientHeight;
      handle.setPointerCapture(e.pointerId);

      function move(ev) {
        const wrapper = document.getElementById('canvas-wrapper');
        const availW  = Math.max(wrapper.clientWidth  - 44, 100);
        const availH  = Math.max(wrapper.clientHeight - 44, 100);
        let newW = dx !== 0
          ? Math.max(80, Math.min(availW, startW + (ev.clientX - startX) * dx))
          : startW;
        let newH = dy !== 0
          ? Math.max(80, Math.min(availH, startH + (ev.clientY - startY) * dy))
          : startH;
        PROP_W = newW;
        PROP_H = newH;
        _sizeCanvas();
        Renderer.render(Store.state);
      }

      function up() {
        handle.removeEventListener('pointermove', move);
        handle.removeEventListener('pointerup',   up);
        // Snap al ratio entero más cercano
        const [nW, nH] = toNiceRatio(PROP_W / PROP_H);
        PROP_W = nW; PROP_H = nH;
        // Recálculo completo una sola vez al soltar
        if (IMAGE_COUNTS.size > 0) {
          if (LOCKED_IMAGES.size > 0) _generateWithLocks();
          else AutoLayout.refit();
        } else {
          fitCanvas();
        }
      }

      handle.addEventListener('pointermove', move);
      handle.addEventListener('pointerup',   up);
    });
  });

  TshirtPreview.init();

  // ── MOBILE TABS ──
  (function() {
    const tabBar  = document.getElementById('mobile-tab-bar');
    const mainEl  = document.getElementById('main');
    if (!tabBar) return;

    tabBar.addEventListener('click', function(e) {
      const btn = e.target.closest('.mtab');
      if (!btn) return;
      const tab = btn.dataset.tab;
      tabBar.querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mainEl.dataset.tab = tab;
      // Forzar resize del renderer 3D al cambiar a la tab de camiseta
      if (tab === 'camiseta') {
        setTimeout(function() {
          window.dispatchEvent(new Event('resize'));
        }, 50);
      }
    });
  })();

})();
</script>
