        _printCtx.beginPath();
        _printCtx.rect(cx, cy, cw, ch);
        _printCtx.clip();
        _printCtx.translate(cx + cw / 2, cy + ch / 2);
        if (rot) _printCtx.rotate(θ);
        _printCtx.drawImage(domImg, -dw / 2, -dh / 2, dw, dh);
        _printCtx.restore();
      }
    } else {
      const avg = (W + H) / 2;
      const m   = Math.round(avg * MARGIN_PCT / 100);
      _bsp(_printCtx, state.root, m, m, W - 2*m, H - 2*m);
    }

    // ── Máscara de cintura: borra la zona del canvas que queda por debajo de _waistY ──
    // Canvas Y=0 = borde superior del estampado (mayor Y en mundo)
    // Canvas Y=H = borde inferior del estampado (menor Y en mundo)
    const ph = _printMaxH * _printScale;
    if (ph > 0 && _waistY !== undefined) {
      const printTop      = _baseY + _offY + ph / 2;
      const canvasYWaist  = (printTop - _waistY) / ph * H;
      if (canvasYWaist < H) {
        _printCtx.clearRect(0, Math.max(0, canvasYWaist), W, H);
      }
    }

    _printTex.needsUpdate = true;
  }

  // ── Compute decal/plane dimensions from current proportion ───────
  function _getDecalDims() {
    if (Store.state.freeMode) {
      // Modo libre: el decal cubre la superficie de impresión completa
      return { pw: _printMaxW * _printScale, ph: _printMaxH * _printScale };
    }
    const asp = (PROP_W > 0 && PROP_H > 0) ? PROP_W / PROP_H : 1;
    const mw = _printMaxW * _printScale, mh = _printMaxH * _printScale;
    let pw, ph;
    if (asp > mw / mh) { pw = mw; ph = mw / asp; }
    else               { ph = mh; pw = mh * asp; }
    return { pw, ph };
  }

  // ── Rebuild DecalGeometry (called on prop/position changes) ──────
  function _rebuildDecal() {
    if (!_useDecal || !_shirtMeshRef || !THREE.DecalGeometry) return;

    if (_decalMesh) {
      _scene.remove(_decalMesh);
      _decalMesh.geometry.dispose();
      _decalMesh = null;
    }

    const { pw, ph } = _getDecalDims();
    // Ensure world matrix is current before DecalGeometry projection
    _shirtMeshRef.updateWorldMatrix(true, false);
    const pos  = new THREE.Vector3(_offX, _baseY + _offY, _printZ);
    const ori  = new THREE.Euler(0, 0, _panelRotDeg * Math.PI / 180);
    // Depth limitado a ~20% del grosor de la camisa para no sangrar a los laterales ni al frente
    const size = new THREE.Vector3(pw, ph, _shirtDepth * 0.20);

    try {
      _decalMesh = new THREE.Mesh(
        new THREE.DecalGeometry(_shirtMeshRef, pos, ori, size),
        new THREE.MeshBasicMaterial({
          map: _printTex, transparent: true,
          depthTest: true, depthWrite: false,
          polygonOffset: true, polygonOffsetFactor: -4,
        })
      );
      _scene.add(_decalMesh);
    } catch (e) {
      console.warn('DecalGeometry failed, reverting to plane:', e);
      _useDecal = false;
      _setupPrintPlane();
    }
  }

  // ── Plane fallback (used when DecalGeometry unavailable/fails) ───
  function _setupPrintPlane() {
    if (_printPlane) return;
    _printPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({ map: _printTex, transparent: true, depthWrite: false,
      })
    );
    _printPlane.position.set(0, _baseY, _printZ);
    _scene.add(_printPlane);
    _updatePlaneScale();
  }

  function _updatePlaneScale() {
    if (!_printPlane) return;
    const { pw, ph } = _getDecalDims();
    _printPlane.scale.set(pw, ph, 1);
    _printPlane.position.x = _offX;
    _printPlane.position.y = _baseY + _offY;
    _printPlane.rotation.z = _panelRotDeg * Math.PI / 180;
  }

  // ── Called by Store.subscribe — rebuilds when ratio or mode changes ─
  let _lastFreeMode = false;
  function _updatePrintScale() {
    const modeChanged = Store.state.freeMode !== _lastFreeMode;
    if (!modeChanged && PROP_W === _lastPropW && PROP_H === _lastPropH) return;
    _lastPropW = PROP_W; _lastPropH = PROP_H;
    _lastFreeMode = Store.state.freeMode;
    if (_useDecal) _rebuildDecal();
    else           _updatePlaneScale();
  }

  // ── Logo superior izquierdo ──────────────────────────────────────
  function _drawLogo() {
    if (!_logoImg) return;
    const w = _logoCanvas.width, h = _logoCanvas.height;
    _logoCtx.clearRect(0, 0, w, h);
    _logoCtx.drawImage(_logoImg, 0, 0, w, h);
    if (_logoFilter === 'invert(1)') {
      const id = _logoCtx.getImageData(0, 0, w, h);
      const d = id.data;
      for (let i = 0; i < d.length; i += 4) {
        d[i] = 255 - d[i]; d[i+1] = 255 - d[i+1]; d[i+2] = 255 - d[i+2];
      }
      _logoCtx.putImageData(id, 0, 0);
    }
    if (_logoTex) _logoTex.needsUpdate = true;
  }

  // Saved logo layout params for fallback rebuild
  let _logoBox = null, _logoSz = null, _logoCenter = null;

  function _setupLogo(box, size, center) {
    _logoBox = box; _logoSz = size; _logoCenter = center;
    const img = new Image();
    img.onload = () => {
      _logoImg = img;
      const asp = img.naturalWidth / img.naturalHeight || 1;
      _logoCanvas.width  = 256;
      _logoCanvas.height = Math.max(1, Math.round(256 / asp));
      _logoTex = new THREE.CanvasTexture(_logoCanvas);
      _logoTex.anisotropy = _maxAniso;
      _drawLogo();
      _buildLogoMesh();
    };
    img.onerror = () => {};
    img.src = LOGO_URL;
  }

  function _buildLogoMesh() {
    if (!_logoTex || !_logoBox) return;
    const box = _logoBox, size = _logoSz, center = _logoCenter;
    const asp = _logoCanvas.width / Math.max(1, _logoCanvas.height);

    // Tamaño: parche pequeño en el pecho (~15% del ancho de la camisa)
    const lw = size.x * 0.15;
    const lh = lw / asp;

    // Posición: pecho derecho del portador, parte frontal.
    // Tras model.rotation.y=π: frente = box.min.z, portador-derecha = -X world.
    const lx = -(box.max.x * 0.30);
    const ly = center.y  + size.y * 0.20;
    const lz = box.min.z;

    if (_logoMesh) { _scene.remove(_logoMesh); _logoMesh.geometry.dispose(); _logoMesh = null; }

    const mat = new THREE.MeshBasicMaterial({
      map: _logoTex, transparent: true,
      depthTest: true, depthWrite: false,
      polygonOffset: true, polygonOffsetFactor: -6,
    });

    if (_useDecal && _shirtMeshRef && THREE.DecalGeometry) {
      _shirtMeshRef.updateWorldMatrix(true, false);
      const pos     = new THREE.Vector3(lx, ly, lz);
      const ori     = new THREE.Euler(0, Math.PI, 0); // normal hacia -Z (frente de camisa)
      const decSize = new THREE.Vector3(lw, lh, size.z * 0.4);
      try {
        _logoMesh = new THREE.Mesh(new THREE.DecalGeometry(_shirtMeshRef, pos, ori, decSize), mat);
        _scene.add(_logoMesh);
        return;
      } catch(e) {
        console.warn('Logo DecalGeometry failed, using plane:', e);
      }
    }

    // Fallback: plano flotante
    _logoMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), mat);
    _logoMesh.rotation.y = Math.PI;
    _logoMesh.scale.set(lw, lh, 1);
    _logoMesh.position.set(lx, ly, lz - 0.003);
    _scene.add(_logoMesh);
  }

  function setLogoFilter(filter) {
    _logoFilter = filter;
    _drawLogo();
  }

  // ── Fallback procedural shirt ────────────────────────────────────
  function _buildFallbackShirt(err) {
    if (err) console.warn('GLB load failed, using fallback shirt:', err);
    const s = new THREE.Shape();
    const bw=1.0, bb=-1.4, sy=0.55, sw_=0.50, sty=0.30, cy=1.0, cw=0.22, cd=0.20;
    s.moveTo(-bw, bb); s.lineTo( bw, bb); s.lineTo( bw, sy);
    s.lineTo( bw+sw_, sy-0.04); s.lineTo( bw+sw_, sy-0.04+sty);
    s.lineTo( bw,    sy+sty-0.09); s.lineTo( cw, cy);
    s.bezierCurveTo(cw, cy-cd, -cw, cy-cd, -cw, cy);
    s.lineTo(-bw, sy+sty-0.09); s.lineTo(-bw-sw_, sy-0.04+sty);
    s.lineTo(-bw-sw_, sy-0.04); s.lineTo(-bw, sy); s.lineTo(-bw, bb);
    _shirtMats = [];
    const _fbMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(_shirtColor), roughness: 0.85, metalness: 0.0
    });
    _shirtMats.push(_fbMat);
    const shirt = new THREE.Mesh(
      new THREE.ExtrudeGeometry(s, { depth: 0.05, bevelEnabled: false }), _fbMat
    );
    _scene.add(shirt);
    _baseY = -0.28; _printZ = 0.062; _printMaxW = 0.94; _printMaxH = 1.10;
    _shirtW = 2.47; _shirtH = 2.50; _shirtCY = -0.655;
    _useDecal = false;
    _setupPrintPlane();
    document.getElementById('tshirt-loading').style.display = 'none';
    redrawPrint(Store.state);
  }

  // ── Main init ─────────────────────────────────────────────────────
  function init() {
    const vp = document.getElementById('tshirt-viewport');
    if (!vp || !window.THREE) return;

    _printCanvas = document.createElement('canvas');
    _printCanvas.width = 1050; _printCanvas.height = 1650;  // 7×11 × 150px
    _printCtx = _printCanvas.getContext('2d');

    _scene = new THREE.Scene();
    _scene.background = new THREE.Color(0xdadada);

    const W = vp.clientWidth || 500, H = vp.clientHeight || 600;
    _cam = new THREE.PerspectiveCamera(34, W / H, 0.05, 100);
    _cam.position.set(0, 0.1, 1.3);   // ~3× más cerca

    _ren = new THREE.WebGLRenderer({ antialias: true });
    _ren.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    _ren.setSize(W, H);
    vp.appendChild(_ren.domElement);
    _maxAniso = _ren.capabilities.getMaxAnisotropy();

    // Key desde el frente del modelo (world -Z), posiciones ajustadas
    _scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const key = new THREE.DirectionalLight(0xffffff, 0.5);
    key.position.set(1, 3, -5); _scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 0.5);
    fill.position.set(-2, 0.5, 3); _scene.add(fill);

    _printTex = new THREE.CanvasTexture(_printCanvas);
    _printTex.anisotropy   = _maxAniso;
    _printTex.magFilter    = THREE.LinearFilter;
    _printTex.minFilter    = THREE.LinearMipmapLinearFilter;
    _printTex.generateMipmaps = true;

    _ctrl = new THREE.OrbitControls(_cam, _ren.domElement);
    _ctrl.enablePan = false;
    _ctrl.minDistance = 0.12;   // permite zoom muy cercano
    _ctrl.maxDistance = 10;
    _ctrl.enableDamping = true;
    _ctrl.dampingFactor = 0.06;
    _ctrl.target.set(0, 0, 0);
    _ctrl.update();

    // Mini secondary view (opposite side)
    const miniCanvas = document.getElementById('tshirt-mini');
    if (miniCanvas) {
      _miniRen = new THREE.WebGLRenderer({ canvas: miniCanvas, antialias: true, alpha: false });
      _miniRen.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      _miniRen.setSize(miniCanvas.clientWidth || 110, miniCanvas.clientHeight || 140);
      _miniRen.setClearColor(0xdadada, 1);
      const mW = miniCanvas.clientWidth || 110, mH = miniCanvas.clientHeight || 140;
      _miniCam = new THREE.PerspectiveCamera(34, mW / mH, 0.05, 100);
    }

    (function loop() {
      requestAnimationFrame(loop);
      _ctrl.update();
      _ren.render(_scene, _cam);
      // Mini view: camera at antipodal position (flip X and Z relative to target)
      if (_miniRen && _miniCam) {
        const t = _ctrl.target;
        const dx = _cam.position.x - t.x;
        const dy = _cam.position.y - t.y;
        const dz = _cam.position.z - t.z;
        _miniCam.position.set(t.x - dx, t.y + dy, t.z - dz);
        _miniCam.lookAt(t);
        _miniRen.render(_scene, _miniCam);
      }
    })();

    // Load GLB
    if (window.THREE && THREE.GLTFLoader) {
      const loader = new THREE.GLTFLoader();
      loader.load(GLB_URL, gltf => {
        const model = gltf.scene;
        model.rotation.y = Math.PI;   // back toward camera

        _shirtMats = [];
        model.traverse(child => {
          if (child.isMesh) {
            const mat = new THREE.MeshStandardMaterial({
              color: new THREE.Color(_shirtColor), roughness: 0.85, metalness: 0.0,
            });
            child.material = mat;
            _shirtMats.push(mat);
          }
        });
        _maleModel = model;
        _scene.add(model);

        // Derive print bounds from bounding box
        const box    = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        const size   = new THREE.Vector3();
        box.getCenter(center); box.getSize(size);
        _baseY      = center.y + size.y * 0.15;
        _printZ     = box.max.z - size.z * 0.05;
        _shirtDepth = size.z;
        // Dimensiones reales del modelo para proyección 2D
        _shirtW  = size.x;
        _shirtH  = size.y;
        _shirtCY = center.y;
        // Limitar el área de estampado al panel trasero (sin sobrepasar laterales/hombros)
        _printMaxW  = size.x * 0.38;
        _printMaxH  = size.y * 0.44;
        // Cintura: calculado DESPUÉS de actualizar _printMaxH.
        // Factor 0.5 = al borde inferior natural del estampado → masking activa al bajar.
        // Factor 0.7: recorte activa ~25% abajo del centro — subir para recortar antes, bajar para después
        _waistY = _baseY - _printMaxH * 0.7;

        // Mesh with max Z = shirt back after rotation.y=π
        let _bestZ = -Infinity;
        model.traverse(child => {
          if (child.isMesh) {
            const mb = new THREE.Box3().setFromObject(child);
            if (mb.max.z > _bestZ) { _bestZ = mb.max.z; _maleMeshRef = child; }
          }
        });
        _shirtMeshRef = _maleMeshRef;

        _useDecal = !!THREE.DecalGeometry;
        _lastPropW = PROP_W; _lastPropH = PROP_H;
        if (_useDecal) _rebuildDecal();
        else           _setupPrintPlane();
        // _shirtMeshRef y _useDecal ya están listos; img.onload es async así que
        // _buildLogoMesh() dentro del callback usará los valores correctos.
        _setupLogo(box, size, center);

        document.getElementById('tshirt-loading').style.display = 'none';
        setTimeout(() => redrawPrint(Store.state), 300);
        setTimeout(() => redrawPrint(Store.state), 1200);
      }, undefined, _buildFallbackShirt);
    } else {
      _buildFallbackShirt(null);
    }

    Store.subscribe(state => {
      redrawPrint(state);
      _updatePrintScale();
      // If any thumb images aren't loaded yet, redraw once they are
      document.querySelectorAll('.thumb img').forEach(img => {
        if (!img.complete || !img.naturalWidth) {
          img.addEventListener('load', () => redrawPrint(Store.state), { once: true });
        }
      });
    });

    new ResizeObserver(() => {
      const w = vp.clientWidth, h = vp.clientHeight;
      if (!w || !h) return;
      _cam.aspect = w / h; _cam.updateProjectionMatrix(); _ren.setSize(w, h);
    }).observe(vp);

    // ── Drag estampado: hover sobre el estampado → cursor move, arrastrar lo mueve ──
    {
      const _ray = new THREE.Raycaster();
      let _printDrag = false, _pdX = 0, _pdY = 0, _pdOx = 0, _pdOy = 0;

      // Lanza un rayo y devuelve true si intersecta el print mesh activo
      function _printHit(e) {
        const mesh = _useDecal ? _decalMesh : _printPlane;
        if (!mesh || !_cam || !_ren) return false;
        const el   = _ren.domElement;
        const rect = el.getBoundingClientRect();
        _ray.setFromCamera({
          x:  ((e.clientX - rect.left) / rect.width)  * 2 - 1,
          y: -((e.clientY - rect.top)  / rect.height) * 2 + 1
        }, _cam);
        return _ray.intersectObject(mesh, false).length > 0;
      }

      // Hover: cursor cambia a "move" cuando el ratón está sobre el estampado
      _ren.domElement.addEventListener('pointermove', e => {
        if (_printDrag) return;
        _ren.domElement.style.cursor = _printHit(e) ? 'move' : '';
      });

      // pointerdown en capture phase: si está sobre el estampado → tomamos el evento
      // Si NO está sobre el estampado → no llamamos stopPropagation → OrbitControls orbita
      _ren.domElement.addEventListener('pointerdown', e => {
        if (e.button !== 0 || !_printHit(e)) return;
        e.stopPropagation();
        _printDrag = true;
        _pdX = e.clientX; _pdY = e.clientY;
        _pdOx = _offX;   _pdOy = _offY;
        _prevDragX = e.clientX; _prevDragY = e.clientY;  // para delta incremental
        _ren.domElement.setPointerCapture(e.pointerId);
      }, { capture: true });

      // ── Tamaño proyectado del área de impresión en píxeles de pantalla ──────
      // Se usa en modo libre para convertir delta de arrastre → delta de canvas
      // con la misma proporción que el área de impresión aparece en el viewport.
      function _screenPrintSize() {
        if (!_cam || !_ren) return null;
        const W = _printMaxW * _printScale, H = _printMaxH * _printScale;
        const cx = _offX, cy = _baseY + _offY, cz = _printZ;
        const pL = new THREE.Vector3(cx - W/2, cy, cz).project(_cam);
        const pR = new THREE.Vector3(cx + W/2, cy, cz).project(_cam);
        const pT = new THREE.Vector3(cx, cy + H/2, cz).project(_cam);
        const pB = new THREE.Vector3(cx, cy - H/2, cz).project(_cam);
        const rect = _ren.domElement.getBoundingClientRect();
        return {
          w: Math.max(1, Math.abs(pR.x - pL.x) / 2 * rect.width),
          h: Math.max(1, Math.abs(pT.y - pB.y) / 2 * rect.height),
        };
      }

      let _prevDragX = 0, _prevDragY = 0;  // posición del puntero en el frame anterior

      // pointermove en capture phase
      _ren.domElement.addEventListener('pointermove', e => {
        if (!_printDrag) return;

        if (Store.state.freeMode && Store.state.freeEls?.length) {
          // ── MODO LIBRE: mover elementos en el canvas ────────────────────────
          // NO se cambia _offX/_offY → el área de impresión permanece fija en la camisa.
          // El delta screen → canvas usa la proyección real del área de impresión.
          const screenDX = e.clientX - _prevDragX;
          const screenDY = e.clientY - _prevDragY;
          _prevDragX = e.clientX;
          _prevDragY = e.clientY;

          const size = _screenPrintSize();
          if (size && (Math.abs(screenDX) > 0.5 || Math.abs(screenDY) > 0.5)) {
            // screenDX/size.w = fracción del área de impresión recorrida = delta canvas
            const dx =  screenDX / size.w;
            const dy =  screenDY / size.h;  // canvas Y↓ = screen Y↓ → mismo signo
            Store.dispatch({ type: 'FREE_MOVE_ALL', dx, dy });
            redrawPrint(Store.state);
          }

        } else {
          // ── MODO PANEL: reposicionar el área de impresión en la camisa ──────
          const scale = 0.5 / Math.max(vp.clientWidth, 1);
          _offX = Math.max(-0.4, Math.min(0.4, _pdOx + (e.clientX - _pdX) * scale));
          _offY = Math.max(-0.4, Math.min(0.4, _pdOy - (e.clientY - _pdY) * scale));
          _prevDragX = e.clientX;
          _prevDragY = e.clientY;
          document.getElementById('print-x').value = Math.round(_offX * 100);
          document.getElementById('print-y').value = Math.round(_offY * 100);
          if (_useDecal) _rebuildDecal(); else _updatePlaneScale();
          redrawPrint(Store.state);
          _notifyOffset();
        }
      }, { capture: true });

      ['pointerup', 'pointercancel'].forEach(ev =>
        _ren.domElement.addEventListener(ev, () => {
          if (!_printDrag) return;
          _printDrag = false;
          _ren.domElement.style.cursor = '';
        }, { capture: true })
      );
    }

    // Position sliders
    document.getElementById('print-size').addEventListener('input', e => {
      _printScale = parseFloat(e.target.value) / 100;
      if (_useDecal) _rebuildDecal();
      else           _updatePlaneScale();
    });
    document.getElementById('print-x').addEventListener('input', e => {
      _offX = parseFloat(e.target.value) / 100;
      if (_useDecal) _rebuildDecal();
      else           _updatePlaneScale();
      _notifyOffset();
    });
    document.getElementById('print-y').addEventListener('input', e => {
      _offY = parseFloat(e.target.value) / 100;
      if (_useDecal) _rebuildDecal();
      else           _updatePlaneScale();
      redrawPrint(Store.state);
      _notifyOffset();
    });
    document.getElementById('btn-reset-print').addEventListener('click', () => {
      _offX = _offY = 0; _printScale = 1.0;
      document.getElementById('print-size').value = 100;
      document.getElementById('print-x').value = 0;
      document.getElementById('print-y').value = 0;
      if (_useDecal) _rebuildDecal();
      else           _updatePlaneScale();
      _notifyOffset();
    });

    setTimeout(() => redrawPrint(Store.state), 400);
  }

  function setShirtColor(hex) {
    _shirtColor = hex;
    _shirtMats.forEach(m => m.color.setStyle(hex));
  }

  function zoomIn() {
    const v    = _cam.position.clone().sub(_ctrl.target);
    const dist = Math.max(_ctrl.minDistance, v.length() * 0.8);
    _cam.position.copy(_ctrl.target).addScaledVector(v.normalize(), dist);
  }
  function zoomOut() {
    const v    = _cam.position.clone().sub(_ctrl.target);
    const dist = Math.min(_ctrl.maxDistance, v.length() * 1.25);
    _cam.position.copy(_ctrl.target).addScaledVector(v.normalize(), dist);
  }

  function syncPrint() {
    _updatePrintScale();
    redrawPrint(Store.state);
  }

  function setPanelRotation(deg) {
    _panelRotDeg = parseFloat(deg) || 0;
    if (_useDecal) _rebuildDecal();
    else           _updatePlaneScale();
    redrawPrint(Store.state);
  }

  let _onOffsetChange = null;  // callback(newX, newY, deltaX, deltaY)
  let _prevOffX = 0, _prevOffY = 0;
  function _notifyOffset() {
    if (!_onOffsetChange) return;
    const dx = _offX - _prevOffX, dy = _offY - _prevOffY;
    _prevOffX = _offX; _prevOffY = _offY;
    _onOffsetChange(_offX, _offY, dx, dy);
  }

  function setOffset(x, y) {
    _offX = x; _offY = y;
    document.getElementById('print-x').value = Math.round(x * 100);
    document.getElementById('print-y').value = Math.round(y * 100);
    if (_useDecal) _rebuildDecal();
    else           _updatePlaneScale();
    redrawPrint(Store.state);
    _notifyOffset();
  }

  function setScale(s) {
    _printScale = s;
    document.getElementById('print-size').value = Math.round(s * 100);
    if (_useDecal) _rebuildDecal();
    else           _updatePlaneScale();
    redrawPrint(Store.state);
  }

  return {
    init, redrawPrint, setShirtColor, zoomIn, zoomOut, syncPrint, setLogoFilter, setPanelRotation,
    onOffsetChange: cb => { _onOffsetChange = cb; },
    getOffset:      () => ({ x: _offX, y: _offY }),
    setOffset,
    setScale,
    /** Devuelve los parámetros necesarios para proyectar el área de impresión al wrapper 2D */
    getShirtLayout: () => ({
      shirtW:  _shirtW,               // ancho total de la camisa (world units)
      shirtH:  _shirtH,               // alto total de la camisa
      shirtCY: _shirtCY,              // centro Y de la camisa en world coords
      printW:  _printMaxW * _printScale,
      printH:  _printMaxH * _printScale,
      offX: _offX,                    // desplazamiento X del área de impresión
      offY: _offY,                    // desplazamiento Y
      baseY: _baseY,                  // posición Y base del área de impresión
    }),
    /** Superficie máxima de impresión (world units) y escala actual */
    getPrintSurface: () => ({ maxW: _printMaxW, maxH: _printMaxH, scale: _printScale }),
    /** Dimensiones actuales del decal (panel proyectado en la camisa) */
    getDecalDims: () => _getDecalDims(),
  };
})();

const BG_PALETTE = [
  { color: '#1a1a1a', label: 'Negro' },
  { color: '#1e3a28', label: 'Verde' },
  { color: '#d5f0ea', label: 'Menta' },
  { color: '#f5f0e8', label: 'Crema' },
];

/** Luminancia perceptual (0=negro, 1=blanco). */
function hexLuminance(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  return 0.299 * r + 0.587 * g + 0.114 * b;
}

function closeBgDropdown() {
  const dd = document.querySelector('.bg-dd');
  if (dd) dd.classList.remove('open');
}

function applyBgColor(color, label) {
  CURRENT_BG = color;
  try { localStorage.setItem('panel-bg-color', color); } catch(e) {}
  const dark = hexLuminance(color) < 0.35;
  const filter = dark ? 'invert(1)' : '';
  document.documentElement.style.setProperty('--canvas-bg', color);
  document.documentElement.style.setProperty('--cell-bg', color);
  document.documentElement.style.setProperty('--img-filter', filter || 'none');
  // Actualizar botón
  const _bgBtn = document.getElementById('bg-btn');
  if (_bgBtn) {
    _bgBtn.style.background   = color;
    _bgBtn.style.borderColor  = hexLuminance(color) < 0.35 ? '#666' : '#bbb';
  }
  // Sync active row in dropdown
  document.querySelectorAll('.cswatch-row').forEach(r => r.classList.remove('active'));
  const activeRow = document.querySelector(`.cswatch-row[data-color="${CSS.escape(color)}"]`);
  if (activeRow) activeRow.classList.add('active');
  // Forzar actualización directa en thumbnails
  document.querySelectorAll('.thumb').forEach(t => {
    t.style.background = color;
    const img = t.querySelector('img');
    if (img) img.style.filter = filter;
  });
  Renderer.render(Store.state);
  TshirtPreview.redrawPrint();
  TshirtPreview.setShirtColor(color);
  TshirtPreview.setLogoFilter(filter || 'none');
  document.querySelectorAll('.shirt-swatch').forEach(s => s.classList.remove('active'));
  closeBgDropdown();
}

function buildBgDropdown() {
  const wrapper = document.getElementById('bg-wrapper');
  const dd = document.createElement('div');
  dd.className = 'bg-dd';

  const grid = document.createElement('div');
  grid.className = 'bg-dd-grid';

  const lightColors = BG_PALETTE.filter(p => hexLuminance(p.color) >= 0.35);
  const darkColors  = BG_PALETTE.filter(p => hexLuminance(p.color) <  0.35);

  function addRow(palette, isFirst) {
    palette.forEach(({ color, label }, i) => {
      const row = document.createElement('div');
      row.className = 'cswatch-row' + (isFirst && i === 0 ? ' active' : '');
      row.dataset.color = color;
      row.innerHTML = `<div class="cswatch" style="background:${color}"></div>
                       <span class="cswatch-lbl">${label}</span>`;
      row.addEventListener('click', () => applyBgColor(color, label));
      grid.appendChild(row);
    });
  }

  addRow(lightColors, true);

  const sep = document.createElement('div');
  sep.className = 'bg-sep';
  grid.appendChild(sep);

  addRow(darkColors, false);

  dd.appendChild(grid);
  dd.addEventListener('click', e => e.stopPropagation());
  wrapper.appendChild(dd);
}

/** Creates a thumb div for one image and appends it to grid. */
function _addThumb(img, grid) {
  const thumb = document.createElement('div');
  thumb.className = 'thumb';
  thumb.dataset.imgId = img.id;

  const el = document.createElement('img');
  el.alt = img.lbl;
  // Load immediately (not lazy) — _bsp needs naturalWidth to render on t-shirt
  _loadImg(el, img.src);

  const lbl = document.createElement('div');
  lbl.className = 'thumb-lbl';
  lbl.textContent = img.lbl;

  thumb.appendChild(el);
  thumb.appendChild(lbl);

  // Double-click → rotation popover
  thumb.addEventListener('dblclick', e => {
    e.stopPropagation(); e.preventDefault();
    thumb.querySelector('.rot-popover')?.remove();
    const pop = document.createElement('div');
    pop.className = 'rot-popover';
    const btnM = document.createElement('button'); btnM.textContent = '↺'; btnM.title = '-15°';
    const numI = document.createElement('input');  numI.type = 'number'; numI.min = 0; numI.max = 359; numI.value = img.rotation || 0;
    const btnP = document.createElement('button'); btnP.textContent = '↻'; btnP.title = '+15°';
    const btnX = document.createElement('button'); btnX.className = 'rot-pop-close'; btnX.textContent = '✕';
    function applyRot(deg) {
      img.rotation = ((Math.round(deg) % 360) + 360) % 360;
      numI.value = img.rotation;
      el.style.transform = img.rotation ? `rotate(${img.rotation}deg)` : '';
      Renderer.render(Store.state);
      TshirtPreview.redrawPrint();
    }
    btnM.addEventListener('click', ev => { ev.stopPropagation(); applyRot((img.rotation || 0) - 15); });
    btnP.addEventListener('click', ev => { ev.stopPropagation(); applyRot((img.rotation || 0) + 15); });
    numI.addEventListener('change', ev => { ev.stopPropagation(); applyRot(parseInt(numI.value) || 0); });
    numI.addEventListener('click',  ev => ev.stopPropagation());
    btnX.addEventListener('click',  ev => { ev.stopPropagation(); pop.remove(); });
    pop.append(btnM, numI, btnP, btnX);
    thumb.appendChild(pop);
    setTimeout(() => {
      document.addEventListener('pointerdown', function oc(ev) {
        if (!pop.contains(ev.target)) { pop.remove(); document.removeEventListener('pointerdown', oc); }
      });
    }, 0);
  });

  // Drag con protección anti-scroll: solo permite drag si el gesto es horizontal.
  // Evita que al deslizar verticalmente la galería se arrastre la imagen por accidente.
  thumb.setAttribute('draggable', 'true');
  let _tStartX = 0, _tStartY = 0, _tDragOk = true;
  thumb.addEventListener('pointerdown', e => {
    _tStartX = e.clientX; _tStartY = e.clientY; _tDragOk = true;
  });
  thumb.addEventListener('pointermove', e => {
    if (!_tDragOk) return;
    const dx = Math.abs(e.clientX - _tStartX);
    const dy = Math.abs(e.clientY - _tStartY);
    if (dy > 4 && dy > dx) _tDragOk = false;
  });
  thumb.addEventListener('dragstart', e => {
    if (!_tDragOk) { e.preventDefault(); return; }
    e.dataTransfer.setData('text/plain', String(img.id));
    e.dataTransfer.effectAllowed = 'copy';
    thumb.classList.add('dragging');
  });
  thumb.addEventListener('dragend', () => thumb.classList.remove('dragging'));

  thumb.addEventListener('click', () => {
    const { selectedId } = Store.state;
    if (selectedId) {
      const node = PM.find(Store.state.root, selectedId);
      if (!node || node.type !== 'leaf') return;
      Store.dispatch({ type: 'ASSIGN', nodeId: selectedId, imageId: img.id });
    } else {
      setImageCount(img.id, (IMAGE_COUNTS.get(img.id) || 0) + 1);
    }
  });

  grid.appendChild(thumb);
}

function initGallery() {
  document.getElementById('gallery-loading').style.display = 'none';
  const grid = document.getElementById('gallery-grid');

  // Read cart (shared with biblioteca) — do NOT delete it; keep for persistence
  let _cartData = null;
  try { _cartData = JSON.parse(localStorage.getItem('panel-design-cart') || 'null'); } catch(e) {}

  const _cartIds = new Set(
    _cartData ? Object.keys(_cartData).map(k => parseInt(k)) : []
  );

  // Show only panels the user selected in biblioteca (empty if entering directly)
  const galleryImages = IMAGES.filter(img => _cartIds.has(img.id));
  galleryImages.forEach(img => _addThumb(img, grid));

  // "+" button — always present; navigates to biblioteca to add / change selection
  const addBtn = document.createElement('div');
  addBtn.className = 'add-panels-btn';
  addBtn.title = 'Agregar paneles desde la biblioteca';
  addBtn.innerHTML = '<span class="add-icon">+</span><span class="add-lbl">Agregar paneles</span>';
  addBtn.addEventListener('click', () => {
    (window.top || window).location.href = (window._appBase || '') + '/biblioteca';
  });
  grid.appendChild(addBtn);

  // Pre-populate IMAGE_COUNTS and restore / auto-generate layout when there's a selection
  if (_cartIds.size) {
    galleryImages.forEach(img => {
      const n = parseInt(_cartData[String(img.id)], 10) || 1;
      setImageCount(img.id, n);
    });

    // Try to restore saved canvas state if cart IDs match exactly
    let _restored = false;
    try {
      const saved = JSON.parse(localStorage.getItem('panel-canvas-state') || 'null');
      if (saved?.root && Array.isArray(saved.cartIds)) {
        const savedSet = new Set(saved.cartIds.map(Number));
        const matches = savedSet.size === _cartIds.size && [...savedSet].every(id => _cartIds.has(id));
        if (matches) {
          _restored = true;
          setTimeout(() => {
            if (saved.propW > 0) PROP_W = saved.propW;
            if (saved.propH > 0) PROP_H = saved.propH;
            fitCanvas();   // contain-fit canvas with restored proportion, then render
            Store.dispatch({ type: 'SET_ROOT', root: saved.root });
          }, 50);
        }
      }
    } catch(e) {}

    if (!_restored) {
      setTimeout(() => AutoLayout.generateDirect([]), 50);
    }
  }

  // Apply active color/filter to newly created thumbnails
  const _activePalette = BG_PALETTE.find(p => p.color === CURRENT_BG);
  applyBgColor(CURRENT_BG, _activePalette?.label);

  // Highlight the thumb of the selected cell's image
  Store.subscribe(state => {
    grid.querySelectorAll('.thumb').forEach(t => t.classList.remove('hi'));
    if (state.selectedId) {
      const node = PM.find(state.root, state.selectedId);
      if (node && node.imageId !== null) {
        const t = grid.querySelector(`[data-img-id="${node.imageId}"]`);
        if (t) t.classList.add('hi');
      }
    }
  });
}

//  CANVAS SIZING
// ══════════════════════════════════════════════════════
let _panoramaH = 0; // always 0 — no panorama scroll mode

/**
 * Size the canvas using contain-fitting: maintains PROP_W/PROP_H aspect ratio,
 * fills at least one wrapper dimension, is centered.
 * Does NOT render — call Renderer.render() separately if needed.
 */
function _sizeCanvas() {
  const wrapper = document.getElementById('canvas-wrapper');
  const canvas  = document.getElementById('canvas');
  const pad     = 44;
  const availW  = Math.max(wrapper.clientWidth  - pad, 80);
  const availH  = Math.max(wrapper.clientHeight - pad, 80);

  // En modo libre el canvas representa la superficie de impresión completa de la camisa
  let propR;
  if (Store.state.freeMode) {
    const ps = TshirtPreview.getPrintSurface();
    propR = ps.maxW / ps.maxH;
  } else {
    propR = PROP_W / PROP_H;
  }

  const wrapR   = availW / availH;
  let cW, cH;
  if (propR >= wrapR) {
    cW = availW;
    cH = Math.round(availW / propR);
  } else {
    cH = availH;
    cW = Math.round(availH * propR);
  }
  wrapper.classList.remove('panorama');
  canvas.style.width  = cW + 'px';
  canvas.style.height = cH + 'px';
  Renderer.updateSize();
}

/** Contain-fit canvas to wrapper, then re-render current layout. */
function fitCanvas() {
  _sizeCanvas();
  Renderer.render(Store.state);
}

  const free    = Store.state.freeMode;
  const btnFree = document.getElementById('btn-free-mode');

  // Interruptor Libre ↔ Panel — convierte en ambas direcciones
  if (btnFree) {
    btnFree.textContent = free ? 'Panel' : 'Libre';
    btnFree.classList.toggle('active', free);
    btnFree.title = free
      ? 'Convertir posiciones libres → cuadrícula y volver al modo panel'
      : 'Pasar al modo libre: cada imagen se mueve independientemente';
  }

  // Generar: activo solo en modo panel
  if (btnGen) {
    btnGen.disabled    = free;
    btnGen.textContent = 'Generar';
    btnGen.title       = free
      ? 'Disponible en modo panel'
      : 'Regenerar el panel automáticamente';
  }

  // Sliders de posición/tamaño del estampado: deshabilitados en modo libre.
  // En libre la superficie es fija (centrada, escala congelada) y la posición
  // se controla moviendo los elementos dentro del canvas.
  const printSize  = document.getElementById('print-size');
  const printX     = document.getElementById('print-x');
  const printY     = document.getElementById('print-y');
  const btnReset   = document.getElementById('btn-reset-print');
  if (printSize)  printSize.disabled  = free;
  if (printX)     printX.disabled     = free;
  if (printY)     printY.disabled     = free;
  if (btnReset)   btnReset.disabled   = free;
}

  Store.subscribe(state => {

    // (el drag usa _fdRender() que ya gestiona el timing con requestAnimationFrame)

    _saveCanvasState();
  });

  });
  document.getElementById('btn-undo').addEventListener('click', () => Store.undo());
  document.getElementById('btn-redo').addEventListener('click', () => Store.redo());

    this.title   = hidden ? 'Mostrar divisores' : 'Ocultar divisores';

  });

  function _applyPanelRot(deg) {
    deg = ((Math.round(deg) % 360) + 360) % 360;
    document.getElementById('panel-rotation').value = deg;
    document.getElementById('canvas').style.transform = deg ? `rotate(${deg}deg)` : '';
    TshirtPreview.setPanelRotation(deg);
  }
  document.getElementById('panel-rotation').addEventListener('change', function() {
    _applyPanelRot(parseInt(this.value) || 0);
  });
  document.getElementById('btn-rot-minus').addEventListener('click', () => {
    _applyPanelRot((parseInt(document.getElementById('panel-rotation').value) || 0) - 15);
  });
  document.getElementById('btn-rot-plus').addEventListener('click', () => {
    _applyPanelRot((parseInt(document.getElementById('panel-rotation').value) || 0) + 15);
  });

  // Settings dropdown removed — controls are inline in toolbar

  // Background color dropdown
  buildBgDropdown();
  document.getElementById('bg-btn').addEventListener('click', e => {
    e.stopPropagation();
    const dd = document.querySelector('.bg-dd');
    const r  = e.currentTarget.getBoundingClientRect();
    dd.style.bottom = (window.innerHeight - r.top + 6) + 'px';
    dd.style.top    = 'auto';
    dd.style.right  = (window.innerWidth - r.right) + 'px';
    dd.style.left   = 'auto';
    dd.classList.toggle('open');
  });
  document.addEventListener('click', closeBgDropdown);

  // Deselect on canvas background click
  canvas.addEventListener('click', e => {
    if (e.target === canvas) Store.dispatch({ type: 'SELECT', nodeId: null });
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT') return;

    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); Store.undo(); }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); Store.redo(); }

    if (e.key === 'Delete' || e.key === 'Backspace') {
      const { selectedId } = Store.state;
      if (selectedId) {
        const node = PM.find(Store.state.root, selectedId);
        if (node?.imageId !== null) Store.dispatch({ type: 'UNASSIGN', nodeId: selectedId });
      }
    }
    if (e.key === 'Escape') Store.dispatch({ type: 'SELECT', nodeId: null });
  });

  // Responsive resize — re-contain canvas to new wrapper size (debounced)
  let _resizeTimer = null;
  new ResizeObserver(() => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(fitCanvas, 150);
  }).observe(document.getElementById('canvas-wrapper'));

  // Initial render — canvas fills available space
  fitCanvas();
  updateToolbar();

  document.getElementById('btn-zoom-in').addEventListener('click',  () => TshirtPreview.zoomIn());
  document.getElementById('btn-zoom-out').addEventListener('click', () => TshirtPreview.zoomOut());

  // ── Free mode ─────────────────────────────────────────────────
  const _canvas = document.getElementById('canvas');
  const _btnFree = document.getElementById('btn-free-mode');
  const _btnGen  = document.getElementById('btn-generate');

  // ── Workspace libre: canvas = área de impresión, wrapper = workspace grande ───
  //
  // Los elementos se colocan libremente en el workspace.
  // El canvas (área imprimible) está centrado en el wrapper.
  // Shift+arrastrar en la camisa desplaza TODOS los elementos en la misma dirección.
  // Los elementos fuera del canvas ([0,1]×[0,1]) no se imprimen.

  const _canvasWrapper = document.getElementById('canvas-wrapper');  // eslint-disable-line
  const _canvasFrame   = document.getElementById('canvas-frame');    // eslint-disable-line

  // El movimiento libre desde la camisa se gestiona directamente en el handler
  // del Shift+drag dentro de TshirtPreview (ver más abajo).
  // Los sliders (print-x/y) controlan la posición del área de impresión de forma
  // independiente sin desplazar los elementos del canvas.

  // ── Copiar / Pegar / Duplicar / Eliminar con teclado en modo libre ───────
  let _freeClip = null;  // clipboard interno del modo libre

  document.addEventListener('keydown', e => {
    if (!Store.state.freeMode) return;
    if (e.target.matches('input,textarea')) return;  // no interferir con inputs
    const ctrl = e.ctrlKey || e.metaKey;

    if (ctrl && e.key === 'c') {
      // Copiar elemento seleccionado
      const el = Store.state.freeEls.find(f => f.id === Store.state.selFreeId);
      if (el) { _freeClip = { ...el }; e.preventDefault(); }
    }

    if (ctrl && (e.key === 'v' || e.key === 'd')) {
      // Pegar (v) o Duplicar (d) — duplicar no requiere clipboard previo
      const src = (e.key === 'd')
        ? Store.state.freeEls.find(f => f.id === Store.state.selFreeId)
        : _freeClip;
      if (!src) { e.preventDefault(); return; }
      const maxZ = Math.max(1, ...(Store.state.freeEls||[]).map(f => f.z||1));
      const newEl = { ...src, id: uid(),
        x: Math.min(0.95 - src.w, src.x + 0.03),
        y: Math.min(0.95 - src.h, src.y + 0.03),
        z: maxZ + 1 };
      Store.dispatch({ type: 'FREE_ADD', el: newEl });
      Store.dispatch({ type: 'FREE_SEL', id: newEl.id });
      if (newEl.imgId != null)
        setImageCount(newEl.imgId, (IMAGE_COUNTS.get(newEl.imgId)||0) + 1);
      e.preventDefault();
    }

    if ((e.key === 'Delete' || e.key === 'Backspace') && Store.state.selFreeId) {
      // Eliminar elemento seleccionado
      const el = Store.state.freeEls.find(f => f.id === Store.state.selFreeId);
      if (el) {
        if (el.imgId != null)
          setImageCount(el.imgId, Math.max(0, (IMAGE_COUNTS.get(el.imgId)||0) - 1));
        Store.dispatch({ type: 'FREE_DEL', id: el.id });
        e.preventDefault();
      }
    }
  });

  // ── Conversión Modo Libre → Grid (BSP) ──────────────────────────────────
  //
  // Caso simple (sin solapamientos):
  //   Cada elemento se convierte en una hoja del BSP en su posición actual.
  //   El espacio restante se rellena con paneles vacíos mediante cortes H/V.
  //
  // Caso con solapamiento:
  //   Se detectan los grupos de elementos solapados (union-find).
  //   El bounding-box del grupo se convierte en un sub-panel y se rellena
  //   con el auto-layout distribuido entre las imágenes del grupo.

  /** ¿Dos rectángulos (normalizados [0,1]) se solapan? */
  function _rectsOverlap(a, b) {
    const EPS = 1e-4;
    return !(a.x + a.w <= b.x + EPS || b.x + b.w <= a.x + EPS ||
             a.y + a.h <= b.y + EPS || b.y + b.h <= a.y + EPS);
  }

  /**
   * Agrupa elementos solapados en "bloques":
   *  - Bloque simple  {single, x, y, w, h}     → un elemento, ningún solapamiento
   *  - Bloque múltiple {multi, x, y, w, h}      → bounding box de un grupo solapado
   */
  function _computeBlocks(freeEls) {
    const n = freeEls.length;
    const p = Array.from({length: n}, (_, i) => i);
    const find = i => { while (p[i] !== i) { p[i] = p[p[i]]; i = p[i]; } return i; };
    const union = (a, b) => { p[find(a)] = find(b); };

    for (let i = 0; i < n; i++)
      for (let j = i + 1; j < n; j++)
        if (_rectsOverlap(freeEls[i], freeEls[j])) union(i, j);

    const map = new Map();
    for (let i = 0; i < n; i++) {
      const r = find(i);
      if (!map.has(r)) map.set(r, []);
      map.get(r).push(freeEls[i]);
    }

    return [...map.values()].map(group => {
      if (group.length === 1) {
        return { single: group[0], x: group[0].x, y: group[0].y,
                 w: group[0].w, h: group[0].h };
      }
      const bx = Math.min(...group.map(e => e.x));
      const by = Math.min(...group.map(e => e.y));
      const x2 = Math.max(...group.map(e => e.x + e.w));
      const y2 = Math.max(...group.map(e => e.y + e.h));
      return { multi: group, x: bx, y: by, w: x2 - bx, h: y2 - by };
    });
  }

  /** Ratio efectivo de una imagen libre (considera rotación 90/270°). */
  function _freeElemRatio(el) {
    const img = IMAGES[el.imgId];
    if (!img) return 1;
    const rot = (el.rot || 0) % 360;
    const r   = Math.max(0.1, img.ratio || 1);
    return (rot === 90 || rot === 270) ? 1 / r : r;
  }

  /**
   * Construye el nodo BSP para un conjunto de bloques dentro de la región
   * (rx, ry, rw, rh) en coordenadas normalizadas [0,1].
   *
   * Busca el corte H/V más equilibrado que no parta ningún bloque.
   * Si no existe corte limpio → auto-layout de todas las imágenes del grupo.
   */
  /** Convierte un array de imgs {id,ratio} a BSP. Guarda ante rows vacío. */
  function _imgsToBSP(imgs, targetR) {
    const valid = imgs.filter(i => i.id != null && IMAGES[i.id]);
    if (!valid.length) return PM.leaf();
    const { rows, normH } = findBestRowPacking(shuffleArray(valid),
                                               Math.max(0.1, targetR));
    if (!rows.length) return PM.leaf();
    return buildRowsBSP(rows, normH);
  }

  function _blocksToNode(blocks, rx, ry, rw, rh) {
    if (!blocks.length) return PM.leaf();

    if (blocks.length === 1) {
      const b = blocks[0];
      if (b.single) {
        const leaf = PM.leaf(b.single.imgId);
        if (b.single.rot) leaf.rotation = b.single.rot;
        return leaf;
      }
      // Grupo solapado: auto-layout en la región actual
      const imgs = b.multi
        .filter(e => e.imgId != null && IMAGES[e.imgId])
        .map(e => ({ id: e.imgId, ratio: _freeElemRatio(e) }));
      return _imgsToBSP(imgs, rw / Math.max(rh, 0.01));
    }

    // Buscar el mejor corte H o V que no parta ningún bloque.
    // Intentamos los bordes de los bloques Y de los elementos individuales
    // dentro de cada bloque multi (para capturar más posibles separadores).
    const EPS       = 1e-4;
    const totalArea = blocks.reduce((s, b) => s + b.w * b.h, 0) || 1;
    let bestCut = null, bestScore = Infinity;

    function tryCut(dir, pos) {
      const g1 = [], g2 = [];
      for (const b of blocks) {
        const start = dir === 'h' ? b.y : b.x;
        const end   = start + (dir === 'h' ? b.h : b.w);
        if (end   <= pos + EPS) g1.push(b);
        else if (start >= pos - EPS) g2.push(b);
        else return; // el bloque atraviesa el corte → descartado
      }
      if (!g1.length || !g2.length) return;
      const score = Math.abs(g1.reduce((s, b) => s + b.w * b.h, 0) / totalArea - 0.5);
      if (score < bestScore) { bestScore = score; bestCut = { dir, pos, g1, g2 }; }
    }

    for (const b of blocks) {
      // Bordes del bloque (o bounding box si es multi)
      tryCut('h', b.y);     tryCut('h', b.y + b.h);
      tryCut('v', b.x);     tryCut('v', b.x + b.w);
      // Bordes de los elementos individuales dentro del bloque multi
      if (b.multi) {
        for (const e of b.multi) {
          tryCut('h', e.y);     tryCut('h', e.y + e.h);
          tryCut('v', e.x);     tryCut('v', e.x + e.w);
        }
      }
    }

    if (!bestCut) {
      // Sin corte limpio: auto-layout de todas las imágenes
      const allImgs = blocks.flatMap(b =>
        b.single
          ? [{ id: b.single.imgId, ratio: _freeElemRatio(b.single) }]
          : b.multi.map(e => ({ id: e.imgId, ratio: _freeElemRatio(e) }))
      );
      return _imgsToBSP(allImgs, rw / Math.max(rh, 0.01));
    }

    const { dir, pos, g1, g2 } = bestCut;
    if (dir === 'h') {
      const ratio  = clamp((pos - ry) / rh, 0.08, 0.92);
      const splitY = ry + rh * ratio;
      return {
        id: uid(), type: 'split', dir: 'h', ratio,
        children: [
          _blocksToNode(g1, rx, ry,     rw, splitY - ry),
          _blocksToNode(g2, rx, splitY, rw, (ry + rh) - splitY)
        ]
      };
    }
    const ratio  = clamp((pos - rx) / rw, 0.08, 0.92);
    const splitX = rx + rw * ratio;
    return {
      id: uid(), type: 'split', dir: 'v', ratio,
      children: [
        _blocksToNode(g1, rx,     ry, splitX - rx,     rh),
        _blocksToNode(g2, splitX, ry, (rx + rw) - splitX, rh)
      ]
    };
  }

  /** Punto de entrada: convierte freeEls actuales → árbol BSP. */
  function _freeToGrid() {
    const freeEls = Store.state.freeEls;
    if (!freeEls?.length) return PM.leaf();
    const blocks = _computeBlocks(freeEls);
    return _blocksToNode(blocks, 0, 0, 1, 1);
  }

  // ─────────────────────────────────────────────────────────────────────────

  let _savedPanelPrint = null;   // offset + escala guardados al entrar en modo libre

  function _exitFreeMode(convertLayout = false) {
    if (convertLayout && Store.state.freeEls?.length) {
      let newRoot;
      try {
        newRoot = _freeToGrid();
      } catch (err) {
        console.error('[free→grid]', err);
        newRoot = null; // fallback: restaurar BSP anterior
      }
      Store.dispatch({ type: 'EXIT_FREE' });
      if (newRoot) Store.dispatch({ type: 'SET_ROOT', root: newRoot });
    } else {
      Store.dispatch({ type: 'EXIT_FREE' });
    }
    // Restaurar offset y escala que tenía el panel antes de entrar en modo libre
    if (_savedPanelPrint) {
      TshirtPreview.setOffset(_savedPanelPrint.x, _savedPanelPrint.y);
      TshirtPreview.setScale(_savedPanelPrint.scale);
      _savedPanelPrint = null;
    }
    fitCanvas();
  }

  // Interruptor Libre ↔ Panel — convierte en ambas direcciones usando el algoritmo
  _btnFree.addEventListener('click', () => {
    if (Store.state.freeMode) {
      // Libre → Panel: convierte posiciones actuales → cuadrícula BSP
      _exitFreeMode(true);
      // render y updateToolbar se disparan por Store.subscribe
    } else {
      // Panel → Libre: convierte BSP actual → elementos libres.
      // El modo libre usa la superficie de impresión completa CENTRADA en la camisa.
      // Remapeamos coordenadas para que las imágenes mantengan tamaño físico,
      // y absorbemos el offset del panel en la posición de los elementos.
      const leaves  = Renderer.getLeafBounds();
      const ps      = TshirtPreview.getPrintSurface();   // { maxW, maxH, scale }
      const decal   = TshirtPreview.getDecalDims();       // { pw, ph } del panel actual
      const off     = TshirtPreview.getOffset();           // { x, y } desplazamiento actual

      // La superficie libre cubre la impresión completa a escala 1.0
      // (la escala se resetea al entrar en libre, así que usamos maxW/maxH directamente)
      const freeW   = ps.maxW;
      const freeH   = ps.maxH;
      const scaleW  = decal.pw / freeW;    // fracción del ancho que ocupa el panel
      const scaleH  = decal.ph / freeH;    // fracción del alto que ocupa el panel

      // Posición base: panel centrado + desplazamiento real en la camisa.
      // off.x/freeW convierte el offset en world-units a coordenada normalizada [0,1].
      // off.y se invierte porque canvas Y↓ ≠ mundo Y↑.
      const baseX   = (1 - scaleW) / 2 + off.x / freeW;
      const baseY   = (1 - scaleH) / 2 - off.y / freeH;

      const freeEls = leaves.map((l, i) => ({
        id: uid(), imgId: l.imageId,
        x: baseX + l.x * scaleW,
        y: baseY + l.y * scaleH,
        w: l.w * scaleW,
        h: l.h * scaleH,
        rot: l.rotation || 0, z: i + 1,
      }));

      // Guardar offset y escala previos para restaurarlos al volver a modo panel
      _savedPanelPrint = { x: off.x, y: off.y, scale: ps.scale };

      Store.dispatch({ type: 'ENTER_FREE', els: freeEls });
      // La superficie libre siempre está centrada en la camisa, escala = 1
      TshirtPreview.setOffset(0, 0);
      TshirtPreview.setScale(1.0);
      // Re-dimensionar el canvas a las proporciones de la superficie de impresión
      _sizeCanvas();
      Renderer.render(Store.state);
      TshirtPreview.redrawPrint();
    }
  });

  // Generar — solo activo en modo panel (bloqueado en libre por updateToolbar)
  document.getElementById('btn-generate').addEventListener('click', () => {
    if (Store.state.freeMode) return;
    if (!IMAGES.length) return;
    if (LOCKED_IMAGES.size > 0) _generateWithLocks();
    else AutoLayout.generateDirect([]);
  });

  // Deselect al clic en fondo del canvas en modo libre
  _canvas.addEventListener('pointerdown', e => {
    if (!Store.state.freeMode) return;
    if (!e.target.closest('.free-el')) {
      if (Store.state.selFreeId !== null)
        Store.dispatch({ type: 'FREE_SEL', id: null });
    }
  });

  // Drop de imágenes desde galería en modo libre
  _canvas.addEventListener('dragover', e => {
    if (!Store.state.freeMode) return;
    e.preventDefault(); e.dataTransfer.dropEffect = 'copy';
  });
  _canvas.addEventListener('drop', e => {
    if (!Store.state.freeMode) return;
    e.preventDefault();
    const imgId = parseInt(e.dataTransfer.getData('text/plain'));
    if (isNaN(imgId) || !IMAGES[imgId]) return;

    const rect = _canvas.getBoundingClientRect();
    const cW = _canvas.clientWidth, cH = _canvas.clientHeight;
    const img = IMAGES[imgId];
    const defaultW = 0.35;
    const defaultH = defaultW / Math.max(0.1, img.ratio || 1) * (cW / cH);

    const cx = (e.clientX - rect.left) / cW;
    const cy = (e.clientY - rect.top)  / cH;
    const maxZ = Math.max(1, ...(Store.state.freeEls || []).map(f => f.z || 1));

    Store.dispatch({
      type: 'FREE_ADD',
      el: {
        id: uid(),
        imgId,
        x: Math.max(0, Math.min(1 - defaultW, cx - defaultW / 2)),
        y: Math.max(0, Math.min(1 - defaultH, cy - defaultH / 2)),
        w: defaultW,
        h: Math.max(0.05, defaultH),
        rot: 0,
        z: maxZ + 1,
      }
    });
    setImageCount(imgId, (IMAGE_COUNTS.get(imgId) || 0) + 1);
    TshirtPreview.redrawPrint();
  });

  // ── Mobile: tshirt-controls toggle ────────────────────────────
  document.getElementById('btn-tc-toggle').addEventListener('click', () => {
    document.getElementById('tshirt-controls').classList.toggle('tc-collapsed');
  });

  // ── Mobile: panel divider drag (resize canvas vs tshirt) ──────
  (function() {
    const divider = document.getElementById('panel-divider');
    const cw = document.getElementById('canvas-col');
    const tp = document.getElementById('tshirt-panel');

    divider.addEventListener('pointerdown', e => {
      e.preventDefault();
      const startY  = e.clientY;
      const startCH = cw.getBoundingClientRect().height;
      const startTH = tp.getBoundingClientRect().height;
      const total   = startCH + startTH;

      function move(ev) {
        const dy    = ev.clientY - startY;
        const newCH = Math.max(80, Math.min(total - 80, startCH + dy));
        cw.style.flex   = 'none';
        cw.style.height = newCH + 'px';
        tp.style.flex   = 'none';
        tp.style.height = (total - newCH) + 'px';
        fitCanvas();
      }

      function up() {
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup',   up);
        fitCanvas();
      }

      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup',   up);
    });
  })();

  // ── Canvas resize handles — drag to set proportion ───────────────
  document.querySelectorAll('.rh').forEach(handle => {
    handle.addEventListener('pointerdown', e => {
      e.preventDefault();
      e.stopPropagation();
      const dx = parseInt(handle.dataset.dx, 10);
      const dy = parseInt(handle.dataset.dy, 10);
      const canvas  = document.getElementById('canvas');
      const startX  = e.clientX;
      const startY  = e.clientY;
      const startW  = canvas.clientWidth;
      const startH  = canvas.clientHeight;
      handle.setPointerCapture(e.pointerId);

      function move(ev) {
        const wrapper = document.getElementById('canvas-wrapper');
        const availW  = Math.max(wrapper.clientWidth  - 44, 100);
        const availH  = Math.max(wrapper.clientHeight - 44, 100);
        let newW = dx !== 0
          ? Math.max(80, Math.min(availW, startW + (ev.clientX - startX) * dx))
          : startW;
        let newH = dy !== 0
          ? Math.max(80, Math.min(availH, startH + (ev.clientY - startY) * dy))
          : startH;
        PROP_W = newW;
        PROP_H = newH;
        _sizeCanvas();
        Renderer.render(Store.state);
      }

      function up() {
        handle.removeEventListener('pointermove', move);
        handle.removeEventListener('pointerup',   up);
        // Snap al ratio entero más cercano
        const [nW, nH] = toNiceRatio(PROP_W / PROP_H);
        PROP_W = nW; PROP_H = nH;
        // Recálculo completo una sola vez al soltar
        if (IMAGE_COUNTS.size > 0) {
          if (LOCKED_IMAGES.size > 0) _generateWithLocks();
          else AutoLayout.refit();
        } else {
          fitCanvas();
        }
      }

      handle.addEventListener('pointermove', move);
      handle.addEventListener('pointerup',   up);
    });
  });

  TshirtPreview.init();

})();
</script>
</body>
</html>
