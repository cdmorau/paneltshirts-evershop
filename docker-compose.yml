version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: paneltshirts-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: paneltshirts
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-paneldev123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panel -d paneltshirts"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
